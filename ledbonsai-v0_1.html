<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDBonsai</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #111114;
            --panel-bg: #0e0e11;
            --text-color: #cccccc;
            --accent-color: #39ff14;
            --border-color: #1e1e28;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #888;
        }

        header h1 span {
            color: var(--accent-color);
            text-shadow: 0 0 8px var(--accent-color), 0 0 20px rgba(57, 255, 20, 0.4);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .controls {
            width: 280px;
            min-width: 280px;
            padding: 1rem;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #555;
        }

        .control-group input,
        .control-group select {
            background: #0a0a0d;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 4px rgba(57, 255, 20, 0.3);
        }

        .control-group input[type="range"] {
            padding: 0;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-row .value {
            font-size: 0.85rem;
            color: var(--accent-color);
            min-width: 2.5rem;
            text-align: right;
            text-shadow: 0 0 6px rgba(57, 255, 20, 0.5);
        }

        .checkbox-group {
            flex-direction: row;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .checkbox-group label {
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: none;
            color: var(--text-color);
        }

        button {
            background: #1a2a1a;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 0 6px rgba(57, 255, 20, 0.5);
            box-shadow: 0 0 6px rgba(57, 255, 20, 0.15);
        }

        button:hover {
            background: #223322;
            box-shadow: 0 0 12px rgba(57, 255, 20, 0.3);
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-row {
            display: flex;
            gap: 0.5rem;
        }

        .btn-row button {
            flex: 1;
        }

        .btn-secondary {
            background: #1a1a1a;
            color: #888;
            border-color: #333;
            text-shadow: none;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: #222;
            box-shadow: none;
        }

        .seed-row, .share-row {
            display: flex;
            gap: 0.5rem;
        }

        .seed-row input, .share-row input {
            flex: 1;
            min-width: 0;
        }

        .btn-icon {
            padding: 0.5rem;
            min-width: 2.5rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .share-row input {
            font-size: 0.75rem;
        }

        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            /* LED panel background: very dark gray with subtle dot grid texture */
            background-color: #131316;
            background-image:
                radial-gradient(circle, #1c1c22 1px, transparent 1px);
            background-size: 10px 10px;
        }

        .zoom-controls {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }

        .zoom-controls button {
            width: 2.5rem;
            height: 2.5rem;
            padding: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 13, 0.85);
            border: 1px solid #333;
            color: #888;
            text-shadow: none;
            box-shadow: none;
        }

        .zoom-controls button:hover {
            background: rgba(30, 30, 35, 0.9);
            color: var(--accent-color);
            text-shadow: 0 0 6px rgba(57, 255, 20, 0.4);
            box-shadow: none;
        }

        .zoom-level {
            display: flex;
            align-items: center;
            padding: 0 0.75rem;
            background: rgba(10, 10, 13, 0.85);
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 0.8rem;
            min-width: 4rem;
            justify-content: center;
            color: #666;
        }

        .canvas-container {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #tree-display {
            /* Square-ish pixels: reduce line-height and letter-spacing so dots pack tightly */
            font-family: "Courier New", Consolas, monospace;
            font-size: 13px;
            line-height: 1.0;
            letter-spacing: 0.12em;
            white-space: pre;
            background: transparent;
            padding: 2rem;
            border-radius: 8px;
            display: inline-block;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }

        #tree-canvas {
            display: block;
        }

        .separator {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 0.5rem 0;
        }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #444;
            margin-top: 0.5rem;
        }

        .credit {
            font-size: 0.7rem;
            color: #444;
            text-align: center;
            padding: 0.5rem 0;
        }

        .credit a {
            color: #667;
            text-decoration: none;
        }

        .credit a:hover {
            text-decoration: underline;
            color: var(--accent-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .controls {
                width: 100%;
                min-width: auto;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            #tree-display {
                font-size: 10px;
            }

            .zoom-controls {
                top: 0.5rem;
                right: 0.5rem;
            }

            .zoom-controls button {
                width: 2rem;
                height: 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>LED<span>Bonsai</span></h1>
    </header>

    <div class="container">
        <aside class="controls">
            <div class="control-group">
                <label for="seed">Seed</label>
                <div class="seed-row">
                    <input type="number" id="seed" placeholder="Random">
                    <button id="randomize-btn" class="btn-icon" title="Randomize seed">🎲</button>
                </div>
            </div>

            <div class="btn-row">
                <button id="generate-btn">Generate</button>
                <button id="stop-btn" class="btn-secondary" disabled>Stop</button>
            </div>

            <div class="control-group">
                <label for="share-url">Share URL</label>
                <div class="share-row">
                    <input type="text" id="share-url" readonly placeholder="Generate a tree first">
                    <button id="copy-btn" class="btn-icon" title="Copy to clipboard">📋</button>
                </div>
            </div>

            <hr class="separator">

            <div class="control-group">
                <label for="tree-type">Tree Type</label>
                <select id="tree-type">
                    <option value="0">Classic</option>
                    <option value="1">Fibonacci</option>
                    <option value="2">Offset Fibonacci</option>
                    <option value="3">Random Fibonacci</option>
                </select>
            </div>

            <div class="control-group">
                <label for="color-palette">Color Palette</label>
                <select id="color-palette">
                    <option value="autumn">Autumn</option>
                    <option value="maple">Autumn Maple</option>
                    <option value="cherry">Cherry Blossom</option>
                    <option value="willow">Weeping Willow</option>
                    <option value="juniper">Juniper</option>
                    <option value="winter">Winter Spruce</option>
                    <option value="birch">Birch</option>
                    <option value="jacaranda">Jacaranda</option>
                    <option value="wisteria">Wisteria</option>
                </select>
            </div>

            <hr class="separator">
            <div class="section-title">Structure</div>

            <div class="control-group">
                <div class="control-row">
                    <label for="layers">Layers</label>
                    <span class="value" id="layers-val">8</span>
                </div>
                <input type="range" id="layers" min="3" max="15" value="8">
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label for="start-len">Branch Length</label>
                    <span class="value" id="start-len-val">15</span>
                </div>
                <input type="range" id="start-len" min="5" max="30" value="15">
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label for="angle">Branch Angle</label>
                    <span class="value" id="angle-val">40°</span>
                </div>
                <input type="range" id="angle" min="15" max="75" value="40">
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label for="leaf-len">Leaf Length</label>
                    <span class="value" id="leaf-len-val">4</span>
                </div>
                <input type="range" id="leaf-len" min="1" max="10" value="4">
            </div>

            <hr class="separator">
            <div class="section-title">Pot</div>

            <div class="control-group">
                <label for="pot-color">Pot Color</label>
                <select id="pot-color">
                    <option value="random">Random</option>
                    <option value="terracotta">Terracotta</option>
                    <option value="slate">Slate</option>
                    <option value="jade">Jade</option>
                    <option value="ocean">Ocean Blue</option>
                    <option value="oxblood">Oxblood</option>
                    <option value="charcoal">Charcoal</option>
                    <option value="cream">Cream</option>
                    <option value="copper">Copper</option>
                </select>
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label for="pot-size">Pot Size</label>
                    <span class="value" id="pot-size-val">25</span>
                </div>
                <input type="range" id="pot-size" min="15" max="35" value="25">
            </div>

            <hr class="separator">
            <div class="section-title">LED Effects</div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="glow-intensity" checked>
                <label for="glow-intensity">Vary glow by density</label>
            </div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="show-fruit" checked>
                <label for="show-fruit">Fruit / flowers (accent LEDs)</label>
            </div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="unlit-panel" checked>
                <label for="unlit-panel">Show unlit panel dots</label>
            </div>

            <hr class="separator">
            <div class="section-title">Animation</div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="instant">
                <label for="instant">Instant (no animation)</label>
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label for="speed">Animation Speed</label>
                    <span class="value" id="speed-val">50</span>
                </div>
                <input type="range" id="speed" min="1" max="100" value="50">
            </div>

            <hr class="separator">

            <div class="credit">
                Inspired by <a href="https://github.com/Ben-Edwards44/PyBonsai" target="_blank" rel="noopener">PyBonsai</a>
                &amp; <a href="#" target="_blank" rel="noopener">JSBonsai</a>
            </div>
        </aside>

        <main class="display-area">
            <div class="zoom-controls">
                <button id="zoom-out-btn" title="Zoom out">−</button>
                <div class="zoom-level"><span id="zoom-level">100</span>%</div>
                <button id="zoom-in-btn" title="Zoom in">+</button>
                <button id="zoom-reset-btn" title="Reset zoom">⟲</button>
            </div>
            <div class="canvas-container">
                <div id="tree-display">
                    <div id="tree-canvas"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ============================================
        // Constants
        // ============================================
        const LED_DOT = '●'; // U+25CF BLACK CIRCLE

        // Unlit LED: very dim dot, barely visible
        const UNLIT_DOT = '·'; // U+00B7 MIDDLE DOT — smaller, less visual weight
        const UNLIT_COLOR = '#252528';

        // Glow levels: how bright/intense each category of lit LED is
        // Used to build CSS text-shadow for the glow effect
        const GLOW = {
            trunk_thick: { blur1: 4, blur2: 12, alpha2: 0.7 },
            trunk_medium: { blur1: 3, blur2: 8,  alpha2: 0.5 },
            trunk_thin:   { blur1: 2, blur2: 6,  alpha2: 0.4 },
            leaf_dense:   { blur1: 5, blur2: 16, alpha2: 0.8 },
            leaf_medium:  { blur1: 4, blur2: 10, alpha2: 0.6 },
            leaf_sparse:  { blur1: 2, blur2: 6,  alpha2: 0.3 },
            fruit:        { blur1: 6, blur2: 20, alpha2: 1.0 },
            pot:          { blur1: 3, blur2: 8,  alpha2: 0.5 },
        };

        // ============================================
        // Seeded Random Number Generator (Mulberry32)
        // ============================================
        class SeededRandom {
            constructor(seed) {
                this.seed = seed >>> 0;
            }

            next() {
                let t = (this.seed += 0x6d2b79f5);
                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            }

            randInt(min, max) {
                return Math.floor(this.next() * (max - min + 1)) + min;
            }

            randFloat(min, max) {
                return this.next() * (max - min) + min;
            }

            normalvariate(mu, sigma) {
                const u1 = this.next();
                const u2 = this.next();
                const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
                return mu + z * sigma;
            }

            choice(arr) {
                return arr[this.randInt(0, arr.length - 1)];
            }

            shuffle(arr) {
                const result = [...arr];
                for (let i = result.length - 1; i > 0; i--) {
                    const j = this.randInt(0, i);
                    [result[i], result[j]] = [result[j], result[i]];
                }
                return result;
            }
        }

        // ============================================
        // Grid - Infinite LED Buffer
        // Stores cells as: { color, glowKey, isUnlit }
        // All chars are always LED_DOT; glowKey drives the CSS shadow
        // ============================================
        class Grid {
            constructor() {
                this.cells = new Map();
                this.minX = Infinity;
                this.maxX = -Infinity;
                this.minY = Infinity;
                this.maxY = -Infinity;
            }

            clear() {
                this.cells = new Map();
                this.minX = Infinity;
                this.maxX = -Infinity;
                this.minY = Infinity;
                this.maxY = -Infinity;
            }

            getKey(x, y) {
                return `${x},${y}`;
            }

            setChar(x, y, color, glowKey = 'leaf_medium', isUnlit = false) {
                const sx = Math.round(x);
                const sy = Math.round(y);
                this.minX = Math.min(this.minX, sx);
                this.maxX = Math.max(this.maxX, sx);
                this.minY = Math.min(this.minY, sy);
                this.maxY = Math.max(this.maxY, sy);
                this.cells.set(this.getKey(sx, sy), { color, glowKey, isUnlit });
                return { screenX: sx, screenY: sy };
            }

            getCell(x, y) {
                return this.cells.get(this.getKey(Math.round(x), Math.round(y))) || null;
            }

            render(showUnlit) {
                if (this.cells.size === 0) return '';

                // Build lookup of all lit cell positions for unlit fill
                const litSet = this.cells;

                let html = '';
                for (let y = this.maxY; y >= this.minY; y--) {
                    for (let x = this.minX; x <= this.maxX; x++) {
                        const cell = litSet.get(this.getKey(x, y));
                        if (cell && !cell.isUnlit) {
                            // Lit LED
                            const shadow = buildGlowStyle(cell.color, cell.glowKey);
                            html += `<span style="color:${cell.color};text-shadow:${shadow}">${LED_DOT}</span>`;
                        } else if (showUnlit) {
                            // Unlit LED dot - always shown if panel mode on
                            html += `<span style="color:${UNLIT_COLOR}">${UNLIT_DOT}</span>`;
                        } else {
                            html += ' ';
                        }
                    }
                    if (y > this.minY) html += '\n';
                }
                return html;
            }

            getWidth()  { return this.maxX - this.minX + 1; }
            getHeight() { return this.maxY - this.minY + 1; }
        }

        // Build CSS text-shadow glow string from a color and glow level key
        function buildGlowStyle(color, glowKey) {
            const g = GLOW[glowKey] || GLOW.leaf_medium;
            // Parse rgb from color string
            const rgb = parseRgb(color);
            const col2 = `rgba(${rgb.r},${rgb.g},${rgb.b},${g.alpha2})`;
            return `0 0 ${g.blur1}px ${color}, 0 0 ${g.blur2}px ${col2}`;
        }

        function parseRgb(color) {
            const m = color.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
            if (m) return { r: +m[1], g: +m[2], b: +m[3] };
            return { r: 255, g: 255, b: 255 };
        }

        // ============================================
        // Vector Utility
        // ============================================
        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(other) { return new Vector(this.x + other.x, this.y + other.y); }
            scale(s)   { return new Vector(this.x * s, this.y * s); }
            magnitude() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            normalize() {
                const m = this.magnitude();
                if (m === 0) return new Vector(0, 0);
                return new Vector(this.x / m, this.y / m);
            }
        }

        // ============================================
        // Animation Queue
        // ============================================
        class AnimationQueue {
            constructor() {
                this.queue = [];
                this.isRunning = false;
                this.isStopped = false;
                this.generationId = 0;
            }

            add(action) { this.queue.push(action); }

            stop() {
                this.isStopped = true;
                this.isRunning = false;
                this.queue = [];
            }

            reset() {
                this.stop();
                this.generationId++;
                this.isStopped = false;
                return this.generationId;
            }

            async run(delayMs, onUpdate, genId) {
                this.isRunning = true;
                while (this.queue.length > 0 && !this.isStopped && genId === this.generationId) {
                    const action = this.queue.shift();
                    action();
                    onUpdate();
                    if (delayMs > 0) {
                        await new Promise(resolve => setTimeout(resolve, delayMs));
                    }
                }
                if (genId === this.generationId) {
                    this.isRunning = false;
                }
            }
        }

        // ============================================
        // Color Palettes
        // ============================================
        const COLOR_PALETTES = {
            autumn: {
                name: 'Autumn',
                branch: { r: [80, 115], g: [70, 95], b: [60, 85] },
                leaves: [
                    { r: [30, 80], g: [120, 200], b: [30, 80] }
                ],
                base: 'rgb(100, 85, 75)',
                fruit: {
                    colors: [
                        { r: [180, 220], g: [30, 60],  b: [30, 60]  },
                        { r: [220, 255], g: [180, 220], b: [50, 100] }
                    ],
                    chance: 0.06
                }
            },
            cherry: {
                name: 'Cherry Blossom',
                branch: { r: [90, 130], g: [60, 80], b: [50, 70] },
                leaves: [
                    { r: [180, 210], g: [80, 110],  b: [100, 130] },
                    { r: [220, 240], g: [100, 140], b: [120, 160] },
                    { r: [255, 255], g: [140, 175], b: [170, 195] },
                    { r: [255, 255], g: [180, 210], b: [195, 220] },
                    { r: [255, 255], g: [230, 255], b: [240, 255] },
                    { r: [50, 100],  g: [120, 180], b: [50, 80]   }
                ],
                base: 'rgb(139, 90, 67)',
                fruit: {
                    colors: [
                        { r: [255, 255], g: [200, 230], b: [210, 240] },
                        { r: [255, 255], g: [255, 255], b: [255, 255] },
                        { r: [255, 255], g: [180, 210], b: [200, 220] }
                    ],
                    chance: 0.12
                }
            },
            juniper: {
                name: 'Juniper',
                branch: { r: [90, 130], g: [80, 100], b: [70, 90] },
                leaves: [
                    { r: [70, 110],  g: [110, 150], b: [120, 160] },
                    { r: [90, 130],  g: [130, 170], b: [140, 175] },
                    { r: [80, 120],  g: [120, 155], b: [110, 145] }
                ],
                base: 'rgb(110, 80, 60)',
                fruit: {
                    colors: [
                        { r: [70, 110],  g: [90, 140],  b: [130, 180] },
                        { r: [90, 130],  g: [110, 150], b: [150, 190] }
                    ],
                    chance: 0.08
                }
            },
            winter: {
                name: 'Winter Spruce',
                branch: { r: [80, 110], g: [60, 80], b: [50, 70] },
                leaves: [
                    { r: [30, 70],   g: [80, 130],  b: [50, 80]   },
                    { r: [60, 100],  g: [110, 150], b: [70, 100]  },
                    { r: [200, 240], g: [220, 250], b: [240, 255] },
                    { r: [180, 210], g: [200, 230], b: [220, 245] }
                ],

        // ============================================
        // Base Tree Class
        // ============================================
        class Tree {
            static BOX_HEIGHT = 3;
            static MAX_TOP_WIDTH = 35;

            // Pot color palettes (same as JSBonsai)
            static POT_COLORS = {
                terracotta: { name: 'Terracotta', color: 'rgb(180, 90, 50)',  rimColor: 'rgb(200, 110, 65)', accentColor: 'rgb(150, 70, 40)',  fillColor: 'rgb(160, 80, 45)'  },
                slate:      { name: 'Slate',      color: 'rgb(90, 95, 105)',  rimColor: 'rgb(110, 115, 125)',accentColor: 'rgb(70, 75, 85)',   fillColor: 'rgb(80, 85, 95)'   },
                jade:       { name: 'Jade',       color: 'rgb(60, 130, 90)',  rimColor: 'rgb(80, 155, 110)', accentColor: 'rgb(45, 105, 70)',  fillColor: 'rgb(55, 120, 82)'  },
                ocean:      { name: 'Ocean Blue', color: 'rgb(50, 100, 140)', rimColor: 'rgb(70, 125, 165)', accentColor: 'rgb(35, 80, 115)',  fillColor: 'rgb(45, 90, 130)'  },
                oxblood:    { name: 'Oxblood',    color: 'rgb(120, 40, 45)',  rimColor: 'rgb(145, 55, 60)',  accentColor: 'rgb(95, 30, 35)',   fillColor: 'rgb(110, 35, 40)'  },
                charcoal:   { name: 'Charcoal',   color: 'rgb(55, 55, 60)',   rimColor: 'rgb(75, 75, 80)',   accentColor: 'rgb(40, 40, 45)',   fillColor: 'rgb(50, 50, 55)'   },
                cream:      { name: 'Cream',      color: 'rgb(220, 210, 185)',rimColor: 'rgb(235, 225, 200)',accentColor: 'rgb(195, 185, 160)',fillColor: 'rgb(210, 200, 175)' },
                copper:     { name: 'Copper',     color: 'rgb(170, 105, 70)', rimColor: 'rgb(195, 130, 90)', accentColor: 'rgb(140, 80, 50)',  fillColor: 'rgb(160, 95, 62)'  }
            };

            constructor(grid, rootX, rootY, options, rng, animQueue) {
                this.grid = grid;
                this.rootX = rootX;
                this.rootY = rootY;
                this.options = options;
                this.rng = rng;
                this.animQueue = animQueue;

                this.palette = COLOR_PALETTES[options.palette] || COLOR_PALETTES.autumn;

                if (options.potColor && options.potColor !== 'random') {
                    this.potColor = Tree.POT_COLORS[options.potColor];
                } else {
                    const keys = Object.keys(Tree.POT_COLORS);
                    this.potColor = Tree.POT_COLORS[this.rng.choice(keys)];
                }

                this.boxTopWidth = this.getBoxWidth();
            }

            getBoxWidth() {
                let width = this.options.potSize || 25;
                width = Math.min(width, Tree.MAX_TOP_WIDTH);
                if (width % 2 === 0) width += 1;
                return width;
            }

            // Set an LED dot on the grid
            setLED(x, y, color, glowKey) {
                this.grid.setChar(x, y, color, glowKey, false);
            }

            setLEDAnimated(x, y, color, glowKey) {
                if (this.options.instant) {
                    this.setLED(x, y, color, glowKey);
                } else {
                    this.animQueue.add(() => {
                        this.setLED(x, y, color, glowKey);
                    });
                }
            }

            getBranchColor() {
                const p = this.palette.branch;
                return `rgb(${this.rng.randInt(p.r[0], p.r[1])}, ${this.rng.randInt(p.g[0], p.g[1])}, ${this.rng.randInt(p.b[0], p.b[1])})`;
            }

            getBarkMarkColor() {
                if (!this.palette.barkMarks) return null;
                const p = this.palette.barkMarks;
                return `rgb(${this.rng.randInt(p.r[0], p.r[1])}, ${this.rng.randInt(p.g[0], p.g[1])}, ${this.rng.randInt(p.b[0], p.b[1])})`;
            }

            getEndCoords(startX, startY, length, theta) {
                return {
                    x: startX + length * Math.sin(theta),
                    y: startY + length * Math.cos(theta)
                };
            }

            // Map branch width to a glow key for density simulation
            getGlowKeyForWidth(width) {
                if (!this.options.glowIntensity) return 'trunk_medium';
                if (width >= 4) return 'trunk_thick';
                if (width >= 2) return 'trunk_medium';
                return 'trunk_thin';
            }

            drawLine(x1, y1, x2, y2, width) {
                const dx = x2 - x1;
                const dy = y2 - y1;
                const steps = Math.max(Math.abs(dx), Math.abs(dy)) * 2;
                if (steps === 0) return;

                const theta = Math.atan2(dx, dy);
                const glowKey = this.getGlowKeyForWidth(width);

                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const x = x1 + dx * t;
                    const y = y1 + dy * t;

                    for (let w = -Math.floor(width / 2); w <= Math.floor(width / 2); w++) {
                        const offsetX = x + w * Math.cos(theta);
                        const offsetY = y - w * Math.sin(theta);

                        let color = this.getBranchColor();
                        // Birch bark marks: darker LEDs occasionally
                        if (this.palette.barkMarks && this.rng.next() < 0.12) {
                            const markChance = Math.min(0.8, width / 4);
                            if (this.rng.next() < markChance) {
                                color = this.getBarkMarkColor() || color;
                            }
                        }

                        this.setLEDAnimated(Math.round(offsetX), Math.round(offsetY), color, glowKey);
                    }
                }
            }

            getInitialParams() {
                let initialWidth = Math.floor(this.options.startLen / 5);
                initialWidth = Math.max(1, Math.min(6, initialWidth));
                const initialAngle = this.rng.normalvariate(0, 0.14);
                return { initialWidth, initialAngle };
            }

            // Draw pot as a filled rectangle of LED dots
            // Shape: rim row, then tapered walls, then bottom row, then feet
            drawBox() {
                const startY = this.rootY - 1;
                const colors = this.potColor;
                const rimWidth = this.boxTopWidth;
                const rimStartX = this.rootX - Math.floor(rimWidth / 2);

                // Rim row
                for (let j = 0; j < rimWidth; j++) {
                    this.setLED(rimStartX + j, startY, colors.rimColor, 'pot');
                }

                // Body rows (tapered)
                for (let i = 1; i < Tree.BOX_HEIGHT; i++) {
                    const y = startY - i;
                    const taper = i;
                    const width = this.boxTopWidth - taper * 2;
                    const startX = this.rootX - Math.floor(width / 2);

                    for (let j = 0; j < width; j++) {
                        const x = startX + j;
                        // Walls and bottom row lit; interior dim
                        const isWall = (j === 0 || j === width - 1);
                        const isBottom = (i === Tree.BOX_HEIGHT - 1);
                        if (isWall || isBottom) {
                            this.setLED(x, y, isBottom ? colors.accentColor : colors.color, 'pot');
                        }
                        // Interior of pot: leave as unlit (will be filled by panel render)
                    }
                }

                // Feet
                this.drawBoxFeet(startY);
            }

            drawBoxFeet(startY) {
                const y = startY - Tree.BOX_HEIGHT;
                const bottomWidth = this.boxTopWidth - (Tree.BOX_HEIGHT - 1) * 2;
                const offset = Math.floor(bottomWidth / 2) - 1;
                if (offset > 0) {
                    this.setLED(this.rootX - offset, y, this.potColor.accentColor, 'pot');
                    this.setLED(this.rootX + offset, y, this.potColor.accentColor, 'pot');
                }
            }

            // Tree base: a few lit dots at the trunk base
            drawTreeBase(trunkWidth) {
                const y = this.rootY;
                const leftX  = this.rootX - Math.floor(trunkWidth / 2);
                const rightX = this.rootX + Math.floor(trunkWidth / 2);
                const baseColor = this.palette.base;
                this.setLED(leftX - 2, y, baseColor, 'trunk_thin');
                this.setLED(leftX - 1, y, baseColor, 'trunk_thin');
                this.setLED(rightX + 1, y, baseColor, 'trunk_thin');
                this.setLED(rightX + 2, y, baseColor, 'trunk_thin');
            }
        }

        // ============================================
        // Leaves - LED particle system
        // ============================================
        class Leaves {
            static NUM_LEAVES = 4;

            constructor(grid, x, y, options, rng, animQueue, palette) {
                this.grid = grid;
                this.x = x;
                this.y = y;
                this.options = options;
                this.rng = rng;
                this.animQueue = animQueue;
                this.palette = palette;
            }

            getLeafColor() {
                const leafColors = this.palette.leaves;
                const p = this.rng.choice(leafColors);
                return `rgb(${this.rng.randInt(p.r[0], p.r[1])}, ${this.rng.randInt(p.g[0], p.g[1])}, ${this.rng.randInt(p.b[0], p.b[1])})`;
            }

            getFruitColor() {
                if (!this.palette.fruit) return null;
                const p = this.rng.choice(this.palette.fruit.colors);
                return `rgb(${this.rng.randInt(p.r[0], p.r[1])}, ${this.rng.randInt(p.g[0], p.g[1])}, ${this.rng.randInt(p.b[0], p.b[1])})`;
            }

            // Map distance ratio to glow key for foliage density gradient
            getLeafGlowKey(distanceRatio) {
                if (!this.options.glowIntensity) return 'leaf_medium';
                if (distanceRatio < 0.3) return 'leaf_dense';
                if (distanceRatio < 0.7) return 'leaf_medium';
                return 'leaf_sparse';
            }

            draw() {
                const gravity = new Vector(0, -1);

                for (let i = 0; i < Leaves.NUM_LEAVES; i++) {
                    let vel = new Vector(
                        this.rng.randFloat(-1, 1),
                        this.rng.randFloat(-1, 1)
                    ).normalize();

                    let pos = new Vector(this.x, this.y);

                    for (let j = 0; j < this.options.leafLen; j++) {
                        pos = pos.add(vel);
                        const distanceRatio = j / this.options.leafLen;

                        const isFruit = this.options.showFruit &&
                            this.palette.fruit &&
                            this.rng.next() < this.palette.fruit.chance;

                        let color, glowKey;
                        if (isFruit) {
                            color   = this.getFruitColor();
                            glowKey = 'fruit';
                        } else {
                            color   = this.getLeafColor();
                            glowKey = this.getLeafGlowKey(distanceRatio);
                        }

                        const px = Math.round(pos.x);
                        const py = Math.round(pos.y);

                        if (this.options.instant) {
                            this.grid.setChar(px, py, color, glowKey, false);
                        } else {
                            this.animQueue.add(() => {
                                this.grid.setChar(px, py, color, glowKey, false);
                            });
                        }

                        // Apply gravity
                        const weight = j / this.options.leafLen;
                        vel = vel.add(gravity.scale(weight));
                    }
                }
            }
        }

        // ============================================
        // Classic Tree
        // ============================================
        class ClassicTree extends Tree {
            static MEAN_BRANCHES  = 2;
            static BRANCHES_STD_DEV = 0.5;
            static ANGLE_STD_DEV  = 0.14;
            static LEN_SCALE      = 0.75;

            draw() {
                const { initialWidth, initialAngle } = this.getInitialParams();
                this.drawBox();
                this.drawTreeBase(initialWidth);
                this.drawBranch(this.rootX, this.rootY, 1, this.options.startLen, initialWidth, initialAngle);
            }

            drawBranch(x, y, layer, length, width, theta) {
                if (layer >= this.options.layers) {
                    new Leaves(this.grid, x, y, this.options, this.rng, this.animQueue, this.palette).draw();
                    return;
                }
                const end = this.getEndCoords(x, y, length, theta);
                this.drawLine(x, y, end.x, end.y, Math.round(width));
                this.drawEndBranches(x, y, layer, length, width, theta);
            }

            drawEndBranches(startX, startY, layer, length, width, theta) {
                let sign = 1;
                let numBranches = Math.max(0, Math.round(
                    this.rng.normalvariate(ClassicTree.MEAN_BRANCHES, ClassicTree.BRANCHES_STD_DEV)
                ));
                const step = numBranches !== 0 ? length / numBranches : 0;
                const newWidth  = Math.max(1, width - 1);
                const newLength = length * ClassicTree.LEN_SCALE;

                for (let i = 0; i < numBranches; i++) {
                    const distUpBranch = (i + 1) * step;
                    const newTheta = theta + sign * this.rng.normalvariate(this.options.angleMean, ClassicTree.ANGLE_STD_DEV);
                    const pos = this.getEndCoords(startX, startY, distUpBranch, theta);
                    this.drawBranch(pos.x, pos.y, layer + 1, newLength, newWidth, newTheta);
                    sign *= -1;
                }
            }
        }

        // ============================================
        // Fibonacci Tree
        // ============================================
        class FibonacciTree extends Tree {
            static ANGLE_STD_DEV = 0.14;
            static LEN_SCALE = 0.75;

            constructor(grid, rootX, rootY, options, rng, animQueue) {
                super(grid, rootX, rootY, options, rng, animQueue);
                this.fib = this.fibNums();
                this.branchNums = this.generateBranchNums();
            }

            fibNums() {
                const fib = [1, 1];
                for (let i = 0; i < this.options.layers; i++) {
                    fib.push(fib[fib.length - 1] + fib[fib.length - 2]);
                }
                return fib;
            }

            generateBranchNums() {
                const branchNums = [[1]];
                for (let i = 0; i < this.options.layers; i++) {
                    const numBranches = this.fib[i + 2];
                    const numParents  = branchNums[branchNums.length - 1].reduce((a, b) => a + b, 0);
                    const base = Math.floor(numBranches / numParents);
                    const diff = numBranches - base * numParents;
                    let currentNums = [];
                    for (let j = 0; j < numParents; j++) {
                        currentNums.push(j < diff ? base + 1 : base);
                    }
                    currentNums = this.rng.shuffle(currentNums);
                    branchNums.push(currentNums);
                }
                return branchNums;
            }

            draw() {
                const { initialWidth, initialAngle } = this.getInitialParams();
                this.drawBox();
                this.drawTreeBase(initialWidth);
                this.drawBranch(this.rootX, this.rootY, 1, 0, this.options.startLen, initialWidth, initialAngle);
            }

            drawBranch(x, y, layerInx, branchInx, length, width, theta) {
                if (layerInx > this.options.layers) {
                    new Leaves(this.grid, x, y, this.options, this.rng, this.animQueue, this.palette).draw();
                    return;
                }
                const end = this.getEndCoords(x, y, length, theta);
                this.drawLine(x, y, end.x, end.y, Math.round(width));
                this.drawEndBranches(x, y, layerInx, branchInx, length, width, theta);
            }

            drawEndBranches(startX, startY, layerInx, branchInx, length, width, theta) {
                let sign = 1;
                const numBranches = this.branchNums[layerInx][branchInx];
                const newWidth  = Math.max(1, width - 1);
                const end = this.getEndCoords(startX, startY, length, theta);

                for (let i = 0; i < numBranches; i++) {
                    const angle    = this.rng.normalvariate(this.options.angleMean, FibonacciTree.ANGLE_STD_DEV);
                    const newTheta = theta + sign * angle;
                    const newLen   = length * FibonacciTree.LEN_SCALE;
                    this.drawBranch(end.x, end.y, layerInx + 1, branchInx + i, newLen, newWidth, newTheta);
                    sign *= -1;
                }
            }
        }

        // ============================================
        // Offset Fibonacci Tree
        // ============================================
        class OffsetFibTree extends FibonacciTree {
            drawEndBranches(startX, startY, layerInx, branchInx, length, width, theta) {
                let sign = 1;
                const numBranches = this.branchNums[layerInx][branchInx];
                const step = numBranches !== 0 ? length / numBranches : 0;
                const newWidth  = Math.max(1, width - 1);
                const newLength = length * FibonacciTree.LEN_SCALE;

                for (let i = 0; i < numBranches; i++) {
                    const distUpBranch = (i + 1) * step;
                    const newTheta = theta + sign * this.rng.normalvariate(this.options.angleMean, FibonacciTree.ANGLE_STD_DEV);
                    const pos = this.getEndCoords(startX, startY, distUpBranch, theta);
                    this.drawBranch(pos.x, pos.y, layerInx + 1, branchInx + i, newLength, newWidth, newTheta);
                    sign *= -1;
                }
            }
        }

        // ============================================
        // Random Offset Fibonacci Tree
        // ============================================
        class RandomOffsetFibTree extends FibonacciTree {
            static GROW_END_THRESHOLD = 0.5;
            static NON_END_MIN = 0.3;
            static NON_END_MAX = 0.9;

            drawEndBranches(startX, startY, layerInx, branchInx, length, width, theta) {
                let sign = 1;
                const numBranches = this.branchNums[layerInx][branchInx];
                const newWidth  = Math.max(1, width - 1);
                const newLength = length * FibonacciTree.LEN_SCALE;
                let needLeaves = true;

                for (let i = 0; i < numBranches; i++) {
                    const growAtEnd = this.rng.next() < RandomOffsetFibTree.GROW_END_THRESHOLD;
                    let distUpBranch;
                    if (growAtEnd) {
                        needLeaves = false;
                        distUpBranch = length;
                    } else {
                        distUpBranch = this.rng.randFloat(
                            length * RandomOffsetFibTree.NON_END_MIN,
                            length * RandomOffsetFibTree.NON_END_MAX
                        );
                    }
                    const newTheta = theta + sign * this.rng.normalvariate(this.options.angleMean, FibonacciTree.ANGLE_STD_DEV);
                    const pos = this.getEndCoords(startX, startY, distUpBranch, theta);
                    this.drawBranch(pos.x, pos.y, layerInx + 1, branchInx + i, newLength, newWidth, newTheta);
                    sign *= -1;
                }

                if (needLeaves) {
                    const endPos = this.getEndCoords(startX, startY, length, theta);
                    new Leaves(this.grid, endPos.x, endPos.y, this.options, this.rng, this.animQueue, this.palette).draw();
                }
            }
        }

        // ============================================
        // Main Application
        // ============================================
        class LEDBonsai {
            constructor() {
                this.canvas         = document.getElementById('tree-canvas');
                this.display        = document.getElementById('tree-display');
                this.generateBtn    = document.getElementById('generate-btn');
                this.stopBtn        = document.getElementById('stop-btn');
                this.randomizeBtn   = document.getElementById('randomize-btn');
                this.copyBtn        = document.getElementById('copy-btn');
                this.shareUrlInput  = document.getElementById('share-url');
                this.zoomInBtn      = document.getElementById('zoom-in-btn');
                this.zoomOutBtn     = document.getElementById('zoom-out-btn');
                this.zoomResetBtn   = document.getElementById('zoom-reset-btn');
                this.zoomLevelSpan  = document.getElementById('zoom-level');
                this.animQueue      = new AnimationQueue();

                this.zoomLevel = 100;
                this.minZoom   = 25;
                this.maxZoom   = 200;
                this.zoomStep  = 25;

                this.bindControls();
                this.bindEvents();

                if (!this.loadFromUrl()) {
                    this.generate();
                }
            }

            loadFromUrl() {
                const params = new URLSearchParams(window.location.search);
                if (!params.has('seed')) return false;

                const paramMap = {
                    'seed':     'seed',
                    'type':     'tree-type',
                    'layers':   'layers',
                    'len':      'start-len',
                    'angle':    'angle',
                    'leaf':     'leaf-len',
                    'speed':    'speed',
                    'instant':  'instant',
                    'palette':  'color-palette',
                    'potcolor': 'pot-color',
                    'potsize':  'pot-size',
                    'glow':     'glow-intensity',
                    'fruit':    'show-fruit',
                    'unlit':    'unlit-panel'
                };

                for (const [urlKey, elemId] of Object.entries(paramMap)) {
                    if (params.has(urlKey)) {
                        const elem = document.getElementById(elemId);
                        if (elem) {
                            if (elem.type === 'checkbox') {
                                elem.checked = params.get(urlKey) === '1';
                            } else {
                                elem.value = params.get(urlKey);
                            }
                            const valSpan = document.getElementById(`${elemId}-val`);
                            if (valSpan) {
                                valSpan.textContent = elemId === 'angle' ? `${elem.value}°` : elem.value;
                            }
                        }
                    }
                }

                this.generate();
                return true;
            }

            buildShareUrl(options) {
                const params = new URLSearchParams();
                params.set('seed',     options.seed);
                params.set('type',     document.getElementById('tree-type').value);
                params.set('layers',   options.layers);
                params.set('len',      options.startLen);
                params.set('angle',    document.getElementById('angle').value);
                params.set('leaf',     options.leafLen);
                params.set('speed',    options.speed);
                params.set('instant',  options.instant  ? '1' : '0');
                params.set('palette',  options.palette);
                params.set('potcolor', options.potColor);
                params.set('potsize',  options.potSize);
                params.set('glow',     options.glowIntensity ? '1' : '0');
                params.set('fruit',    options.showFruit     ? '1' : '0');
                params.set('unlit',    options.unlitPanel    ? '1' : '0');
                return `${window.location.origin}${window.location.pathname}?${params.toString()}`;
            }

            setZoom(level) {
                this.zoomLevel = Math.max(this.minZoom, Math.min(this.maxZoom, level));
                this.zoomLevelSpan.textContent = this.zoomLevel;
                this.display.style.transform = `scale(${this.zoomLevel / 100})`;
            }

            bindControls() {
                const ranges = ['layers', 'start-len', 'angle', 'leaf-len', 'speed', 'pot-size'];
                ranges.forEach(id => {
                    const input   = document.getElementById(id);
                    const valSpan = document.getElementById(`${id}-val`);
                    if (input && valSpan) {
                        input.addEventListener('input', () => {
                            valSpan.textContent = id === 'angle' ? `${input.value}°` : input.value;
                        });
                    }
                });
            }

            bindEvents() {
                this.generateBtn.addEventListener('click', () => this.generate());
                this.stopBtn.addEventListener('click',    () => this.stop());

                this.randomizeBtn.addEventListener('click', () => {
                    document.getElementById('seed').value = Math.floor(Math.random() * 2147483647);
                    this.generate();
                });

                this.copyBtn.addEventListener('click', () => {
                    const url = this.shareUrlInput.value;
                    if (url) {
                        navigator.clipboard.writeText(url).then(() => {
                            this.copyBtn.textContent = '✓';
                            setTimeout(() => { this.copyBtn.textContent = '📋'; }, 1500);
                        });
                    }
                });

                this.zoomInBtn.addEventListener('click',    () => this.setZoom(this.zoomLevel + this.zoomStep));
                this.zoomOutBtn.addEventListener('click',   () => this.setZoom(this.zoomLevel - this.zoomStep));
                this.zoomResetBtn.addEventListener('click', () => this.setZoom(100));

                document.querySelector('.canvas-container').addEventListener('wheel', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        e.preventDefault();
                        this.setZoom(this.zoomLevel + (e.deltaY > 0 ? -this.zoomStep : this.zoomStep));
                    }
                }, { passive: false });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) {
                        if (document.activeElement.tagName !== 'INPUT') {
                            this.generate();
                        }
                    }
                });
            }

            stop() {
                this.animQueue.stop();
                this.generateBtn.disabled = false;
                this.stopBtn.disabled     = true;
            }

            getOptions() {
                const seedInput = document.getElementById('seed');
                let seed;
                if (seedInput.value) {
                    seed = parseInt(seedInput.value);
                } else {
                    seed = Math.floor(Math.random() * 2147483647);
                    seedInput.value = seed;
                }

                return {
                    seed,
                    treeType:      parseInt(document.getElementById('tree-type').value),
                    layers:        parseInt(document.getElementById('layers').value),
                    startLen:      parseInt(document.getElementById('start-len').value),
                    angleMean:     parseInt(document.getElementById('angle').value) * (Math.PI / 180),
                    leafLen:       parseInt(document.getElementById('leaf-len').value),
                    instant:       document.getElementById('instant').checked,
                    speed:         parseInt(document.getElementById('speed').value),
                    palette:       document.getElementById('color-palette').value,
                    potColor:      document.getElementById('pot-color').value,
                    potSize:       parseInt(document.getElementById('pot-size').value),
                    glowIntensity: document.getElementById('glow-intensity').checked,
                    showFruit:     document.getElementById('show-fruit').checked,
                    unlitPanel:    document.getElementById('unlit-panel').checked,
                };
            }

            async generate() {
                const genId  = this.animQueue.reset();
                const options = this.getOptions();
                const rng    = new SeededRandom(options.seed);
                const grid   = new Grid();

                const rootX = 0;
                let rootY   = Tree.BOX_HEIGHT + 4;
                if (rootY % 2 !== 0) rootY++;

                let tree;
                switch (options.treeType) {
                    case 1:  tree = new FibonacciTree(grid, rootX, rootY, options, rng, this.animQueue);      break;
                    case 2:  tree = new OffsetFibTree(grid, rootX, rootY, options, rng, this.animQueue);      break;
                    case 3:  tree = new RandomOffsetFibTree(grid, rootX, rootY, options, rng, this.animQueue);break;
                    default: tree = new ClassicTree(grid, rootX, rootY, options, rng, this.animQueue);
                }

                tree.draw();

                this.shareUrlInput.value = this.buildShareUrl(options);

                const showUnlit = options.unlitPanel;

                if (options.instant) {
                    this.canvas.innerHTML = grid.render(showUnlit);
                } else {
                    this.generateBtn.disabled = true;
                    this.stopBtn.disabled     = false;

                    const baseDelay = 101 - options.speed;
                    const delay     = Math.max(1, Math.round(baseDelay / 12));

                    await this.animQueue.run(delay, () => {
                        this.canvas.innerHTML = grid.render(showUnlit);
                    }, genId);

                    if (genId === this.animQueue.generationId) {
                        this.generateBtn.disabled = false;
                        this.stopBtn.disabled     = true;
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new LEDBonsai();
        });
    </script>
</body>
</html>
