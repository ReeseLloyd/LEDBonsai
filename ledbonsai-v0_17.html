<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEDBonsai v0.17</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiBmaWxsPSIjMTMxMzE2Ii8+CiAgPGRlZnM+CiAgICA8cmFkaWFsR3JhZGllbnQgaWQ9ImciIGN4PSI1MCUiIGN5PSI1MCUiIHI9IjUwJSI+CiAgICAgIDxzdG9wIG9mZnNldD0iMCUiIHN0b3AtY29sb3I9IiNmZmZmZmYiIHN0b3Atb3BhY2l0eT0iMSIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjMwJSIgc3RvcC1jb2xvcj0iIzM5ZmYxNCIgc3RvcC1vcGFjaXR5PSIxIi8+CiAgICAgIDxzdG9wIG9mZnNldD0iNjAlIiBzdG9wLWNvbG9yPSIjMzlmZjE0IiBzdG9wLW9wYWNpdHk9IjAuNCIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiMzOWZmMTQiIHN0b3Atb3BhY2l0eT0iMCIvPgogICAgPC9yYWRpYWxHcmFkaWVudD4KICA8L2RlZnM+CiAgPGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTQiIGZpbGw9InVybCgjZykiLz4KICA8Y2lyY2xlIGN4PSIxNiIgY3k9IjE2IiByPSI1IiBmaWxsPSIjY2NmZmNjIi8+Cjwvc3ZnPg==">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #111114;
            --panel-bg: #0e0e11;
            --text-color: #cccccc;
            --accent-color: #39ff14;
            --border-color: #1e1e28;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #888;
        }

        header h1 span {
            color: var(--accent-color);
            text-shadow: 0 0 8px var(--accent-color), 0 0 20px rgba(57, 255, 20, 0.4);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .controls {
            width: 280px;
            min-width: 280px;
            padding: 1rem;
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #555;
        }

        .control-group input,
        .control-group select {
            background: #0a0a0d;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 4px rgba(57, 255, 20, 0.3);
        }

        .control-group input[type="range"] {
            padding: 0;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-row .value {
            font-size: 0.85rem;
            color: var(--accent-color);
            min-width: 2.5rem;
            text-align: right;
            text-shadow: 0 0 6px rgba(57, 255, 20, 0.5);
        }

        .checkbox-group {
            flex-direction: row;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input {
            width: 1rem;
            height: 1rem;
            cursor: pointer;
            accent-color: var(--accent-color);
        }

        .checkbox-group label {
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: none;
            color: var(--text-color);
        }

        button {
            background: #1a2a1a;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 0.75rem 1rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 0 6px rgba(57, 255, 20, 0.5);
            box-shadow: 0 0 6px rgba(57, 255, 20, 0.15);
        }

        button:hover {
            background: #223322;
            box-shadow: 0 0 12px rgba(57, 255, 20, 0.3);
        }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-row {
            display: flex;
            gap: 0.5rem;
        }

        .btn-row button {
            flex: 1;
        }

        .btn-secondary {
            background: #1a1a1a;
            color: #888;
            border-color: #333;
            text-shadow: none;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: #222;
            box-shadow: none;
        }

        .seed-row, .share-row {
            display: flex;
            gap: 0.5rem;
        }

        .seed-row input, .share-row input {
            flex: 1;
            min-width: 0;
        }

        .btn-icon {
            padding: 0.5rem;
            min-width: 2.5rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .share-row input {
            font-size: 0.75rem;
        }

        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            /* LED panel background: very dark gray with subtle dot grid texture */
            background-color: #131316;
            background-image:
                radial-gradient(circle, #1c1c22 1px, transparent 1px);
            background-size: 10px 10px;
        }

        .zoom-controls {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }

        .zoom-controls button {
            width: 2.5rem;
            height: 2.5rem;
            padding: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 13, 0.85);
            border: 1px solid #333;
            color: #888;
            text-shadow: none;
            box-shadow: none;
        }

        .zoom-controls button:hover {
            background: rgba(30, 30, 35, 0.9);
            color: var(--accent-color);
            text-shadow: 0 0 6px rgba(57, 255, 20, 0.4);
            box-shadow: none;
        }

        .zoom-level {
            display: flex;
            align-items: center;
            padding: 0 0.75rem;
            background: rgba(10, 10, 13, 0.85);
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 0.8rem;
            min-width: 4rem;
            justify-content: center;
            color: #666;
        }

        .canvas-container {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #tree-display {
            /* Square-ish pixels: reduce line-height and letter-spacing so dots pack tightly */
            font-family: "Courier New", Consolas, monospace;
            font-size: 13px;
            line-height: 1.0;
            letter-spacing: 0.12em;
            white-space: pre;
            background: transparent;
            padding: 2rem;
            border-radius: 8px;
            display: inline-block;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }

        #tree-canvas {
            display: block;
        }

        .separator {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 0.5rem 0;
        }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #444;
            margin-top: 0.5rem;
        }

        .credit {
            font-size: 0.7rem;
            color: #444;
            text-align: center;
            padding: 0.5rem 0;
        }

        .credit a {
            color: #667;
            text-decoration: none;
        }

        .credit a:hover {
            text-decoration: underline;
            color: var(--accent-color);
        }

        /* Monochrome sub-controls */
        .mono-controls {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            padding: 0.5rem 0 0 0;
        }
        .mono-controls.visible { display: flex; }

        .mono-preset-row {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .mono-preset {
            width: 1.6rem;
            height: 1.6rem;
            border-radius: 50%;
            border: 2px solid #333;
            cursor: pointer;
            padding: 0;
            font-size: 0;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: none;
            text-shadow: none;
            background: transparent;
            min-width: unset;
        }
        .mono-preset:hover, .mono-preset.active {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .mono-picker-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: #666;
        }
        .mono-picker-row input[type="color"] {
            width: 2rem;
            height: 1.6rem;
            padding: 0;
            border: 1px solid #333;
            border-radius: 4px;
            cursor: pointer;
            background: #0a0a0d;
        }

        /* Export modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.visible { display: flex; }

        .modal {
            background: #0e0e11;
            border: 1px solid #2a2a38;
            border-radius: 8px;
            padding: 1.5rem;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .modal h2 {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent-color);
            text-shadow: 0 0 8px rgba(57,255,20,0.4);
        }

        .modal p {
            font-size: 0.8rem;
            color: #666;
            line-height: 1.5;
        }

        .bg-options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .bg-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            border: 1px solid #222;
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            font-size: 0.85rem;
            color: #aaa;
        }
        .bg-option:hover { border-color: #444; background: #111; }
        .bg-option.selected {
            border-color: var(--accent-color);
            background: #0d1a0d;
            color: var(--text-color);
        }

        .bg-swatch {
            width: 2rem;
            height: 1.4rem;
            border-radius: 3px;
            border: 1px solid #333;
            flex-shrink: 0;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
        }
        .modal-actions button { flex: 1; }

        .export-status {
            font-size: 0.75rem;
            color: #666;
            text-align: center;
            min-height: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .controls {
                width: 100%;
                min-width: auto;
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            #tree-display {
                font-size: 10px;
            }

            .zoom-controls {
                top: 0.5rem;
                right: 0.5rem;
            }

            .zoom-controls button {
                width: 2rem;
                height: 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>LED<span>Bonsai</span></h1>
    </header>

    <div class="container">
        <aside class="controls">
            <div class="control-group">
                <label for="seed">Seed</label>
                <div class="seed-row">
                    <input type="number" id="seed" placeholder="Random">
                    <button id="randomize-btn" class="btn-icon" title="Randomize seed">🎲</button>
                </div>
            </div>

            <div class="btn-row">
                <button id="generate-btn">Start</button>
                <button id="stop-btn" class="btn-secondary" disabled>Stop</button>
                <button id="randomize-all-btn" class="btn-icon btn-secondary" title="Randomize tree type, palette &amp; structure">🎰</button>
                <button id="defaults-btn" class="btn-icon btn-secondary" title="Restore defaults">↺</button>
            </div>

            <hr class="separator">

            <div class="control-group">
                <label for="tree-type">Tree Type</label>
                <select id="tree-type">
                    <option value="0">Classic</option>
                    <option value="1">Fibonacci</option>
                    <option value="2">Offset Fibonacci</option>
                    <option value="3">Random Fibonacci</option>
                </select>
            </div>

            <div class="control-group">
                <label for="color-palette">Color Palette</label>
                <select id="color-palette">
                    <option value="autumn">Autumn</option>
                    <option value="maple">Autumn Maple</option>
                    <option value="cherry">Cherry Blossom</option>
                    <option value="willow">Weeping Willow</option>
                    <option value="juniper">Juniper</option>
                    <option value="winter">Winter Spruce</option>
                    <option value="birch">Birch</option>
                    <option value="jacaranda">Jacaranda</option>
                    <option value="wisteria">Wisteria</option>
                    <option value="winterbare">Winter (Bare)</option>
                    <option value="sakuranight">Sakura Night</option>
                    <option value="monochrome" id="mono-option">Monochrome</option>
                </select>
                <!-- Monochrome sub-controls, shown only when monochrome is selected -->
                <div class="mono-controls" id="mono-controls">
                    <div class="mono-preset-row" id="mono-presets">
                        <button class="mono-preset active" data-color="#39ff14" title="Phosphor Green" style="background:#39ff14;box-shadow:0 0 6px #39ff14"></button>
                        <button class="mono-preset" data-color="#ffaa00" title="Amber" style="background:#ffaa00"></button>
                        <button class="mono-preset" data-color="#00aaff" title="Ice Blue" style="background:#00aaff"></button>
                        <button class="mono-preset" data-color="#ff3333" title="Red" style="background:#ff3333"></button>
                        <button class="mono-preset" data-color="#ffffff" title="White" style="background:#ffffff"></button>
                        <button class="mono-preset" data-color="#cc66ff" title="Violet" style="background:#cc66ff"></button>
                    </div>
                    <div class="mono-picker-row">
                        <input type="color" id="mono-color" value="#39ff14" title="Custom color">
                        <span>Custom color</span>
                    </div>
                </div>
            </div>

            <hr class="separator">
            <div class="section-title">Structure</div>

            <div class="control-group">
                <div class="control-row">
                    <label for="layers">Layers</label>
                    <span class="value" id="layers-val">8</span>
                </div>
                <input type="range" id="layers" min="3" max="15" value="8">
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label for="start-len">Branch Length</label>
                    <span class="value" id="start-len-val">15</span>
                </div>
                <input type="range" id="start-len" min="5" max="30" value="15">
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label for="angle">Branch Angle</label>
                    <span class="value" id="angle-val">40°</span>
                </div>
                <input type="range" id="angle" min="15" max="75" value="40">
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label for="leaf-len">Leaf Length</label>
                    <span class="value" id="leaf-len-val">4</span>
                </div>
                <input type="range" id="leaf-len" min="1" max="10" value="4">
            </div>

            <hr class="separator">
            <div class="section-title">Pot</div>

            <div class="control-group">
                <label for="pot-color">Pot Color</label>
                <select id="pot-color">
                    <option value="random">Random</option>
                    <option value="terracotta">Terracotta</option>
                    <option value="slate">Slate</option>
                    <option value="jade">Jade</option>
                    <option value="ocean">Ocean Blue</option>
                    <option value="oxblood">Oxblood</option>
                    <option value="charcoal">Charcoal</option>
                    <option value="cream">Cream</option>
                    <option value="copper">Copper</option>
                    <option value="cobalt">Cobalt (Gloss)</option>
                    <option value="vermillion">Vermillion (Gloss)</option>
                    <option value="obsidian">Obsidian (Gloss)</option>
                    <option value="forest">Forest (Gloss)</option>
                    <option value="aubergine">Aubergine (Gloss)</option>
                    <option value="gold">Gold (Gloss)</option>
                    <option value="teal">Teal (Gloss)</option>
                </select>
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label for="pot-size">Pot Size</label>
                    <span class="value" id="pot-size-val">25</span>
                </div>
                <input type="range" id="pot-size" min="15" max="35" value="25">
            </div>

            <hr class="separator">
            <div class="section-title">LED Effects</div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="glow-intensity" checked>
                <label for="glow-intensity">Vary glow by density</label>
            </div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="show-fruit" checked>
                <label for="show-fruit">Fruit / flowers (accent LEDs)</label>
            </div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="unlit-panel" checked>
                <label for="unlit-panel">Show unlit panel dots</label>
            </div>

            <hr class="separator">
            <div class="section-title">Animation</div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="instant">
                <label for="instant">Instant (no animation)</label>
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label for="speed">Animation Speed</label>
                    <span class="value" id="speed-val">50</span>
                </div>
                <input type="range" id="speed" min="1" max="100" value="50">
            </div>

            <hr class="separator">
            <div class="section-title">Share</div>

            <div class="control-group">
                <div class="share-row">
                    <input type="text" id="share-url" readonly placeholder="Generate a tree first">
                    <button id="copy-btn" class="btn-icon" title="Copy to clipboard">📋</button>
                </div>
            </div>

            <hr class="separator">
            <div class="section-title">Export</div>

            <button id="export-btn">Export PNG…</button>

            <hr class="separator">

            <div class="credit">
                Inspired by <a href="https://github.com/Ben-Edwards44/PyBonsai" target="_blank" rel="noopener">PyBonsai</a>
                &amp; <a href="#" target="_blank" rel="noopener">JSBonsai</a>
            </div>
        </aside>

        <main class="display-area">
            <div class="zoom-controls">
                <button id="zoom-out-btn" title="Zoom out">−</button>
                <div class="zoom-level"><span id="zoom-level">100</span>%</div>
                <button id="zoom-in-btn" title="Zoom in">+</button>
                <button id="zoom-reset-btn" title="Reset zoom">⟲</button>
            </div>
            <div class="canvas-container">
                <div id="tree-display">
                    <div id="tree-canvas"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Export PNG modal -->
    <div class="modal-overlay" id="export-modal">
        <div class="modal">
            <h2>Export PNG</h2>
            <p>Choose a background for the exported image.</p>
            <div class="bg-options">
                <div class="bg-option selected" data-bg="panel">
                    <div class="bg-swatch" style="background:#131316;background-image:radial-gradient(circle,#1c1c22 1px,transparent 1px);background-size:6px 6px"></div>
                    Panel (dark gray + dots)
                </div>
                <div class="bg-option" data-bg="black">
                    <div class="bg-swatch" style="background:#000000"></div>
                    Pure black
                </div>
                <div class="bg-option" data-bg="transparent">
                    <div class="bg-swatch" style="background: repeating-conic-gradient(#333 0% 25%, #111 0% 50%) 0 0 / 12px 12px"></div>
                    Transparent
                </div>
            </div>
            <div class="modal-actions">
                <button id="export-cancel-btn" class="btn-secondary">Cancel</button>
                <button id="export-confirm-btn">Download</button>
            </div>
            <div class="export-status" id="export-status"></div>
        </div>
    </div>

    <script>
        // ============================================
        // Constants
        // ============================================
        const LED_DOT = '●'; // U+25CF BLACK CIRCLE

        // Unlit LED: invisible — just a space to preserve grid spacing
        const UNLIT_DOT = ' ';
        const UNLIT_COLOR = 'transparent';

        // Glow levels: how bright/intense each category of lit LED is
        // Used to build CSS text-shadow for the glow effect
        const GLOW = {
            trunk_thick: { blur1: 4, blur2: 12, alpha2: 0.7 },
            trunk_medium: { blur1: 3, blur2: 8,  alpha2: 0.5 },
            trunk_thin:   { blur1: 2, blur2: 6,  alpha2: 0.4 },
            leaf_dense:   { blur1: 5, blur2: 16, alpha2: 0.8 },
            leaf_medium:  { blur1: 4, blur2: 10, alpha2: 0.6 },
            leaf_sparse:  { blur1: 2, blur2: 6,  alpha2: 0.3 },
            fruit:        { blur1: 6, blur2: 20, alpha2: 1.0 },
            pot:          { blur1: 3, blur2: 8,  alpha2: 0.5 },
        };

        // ============================================
        // Seeded Random Number Generator (Mulberry32)
        // ============================================
        class SeededRandom {
            constructor(seed) {
                this.seed = seed >>> 0;
            }

            next() {
                let t = (this.seed += 0x6d2b79f5);
                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            }

            randInt(min, max) {
                return Math.floor(this.next() * (max - min + 1)) + min;
            }

            randFloat(min, max) {
                return this.next() * (max - min) + min;
            }

            normalvariate(mu, sigma) {
                const u1 = this.next();
                const u2 = this.next();
                const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
                return mu + z * sigma;
            }

            choice(arr) {
                return arr[this.randInt(0, arr.length - 1)];
            }

            shuffle(arr) {
                const result = [...arr];
                for (let i = result.length - 1; i > 0; i--) {
                    const j = this.randInt(0, i);
                    [result[i], result[j]] = [result[j], result[i]];
                }
                return result;
            }
        }

        // ============================================
        // Grid - Infinite LED Buffer
        // Stores cells as: { color, glowKey, isUnlit }
        // All chars are always LED_DOT; glowKey drives the CSS shadow
        // ============================================
        class Grid {
            constructor() {
                this.cells = new Map();
                this.minX = Infinity;
                this.maxX = -Infinity;
                this.minY = Infinity;
                this.maxY = -Infinity;
            }

            clear() {
                this.cells = new Map();
                this.minX = Infinity;
                this.maxX = -Infinity;
                this.minY = Infinity;
                this.maxY = -Infinity;
            }

            getKey(x, y) {
                return `${x},${y}`;
            }

            setChar(x, y, color, glowKey = 'leaf_medium', isUnlit = false) {
                const sx = Math.round(x);
                const sy = Math.round(y);
                this.minX = Math.min(this.minX, sx);
                this.maxX = Math.max(this.maxX, sx);
                this.minY = Math.min(this.minY, sy);
                this.maxY = Math.max(this.maxY, sy);
                this.cells.set(this.getKey(sx, sy), { color, glowKey, isUnlit });
                return { screenX: sx, screenY: sy };
            }

            getCell(x, y) {
                return this.cells.get(this.getKey(Math.round(x), Math.round(y))) || null;
            }

            render(showUnlit) {
                if (this.cells.size === 0) return '';

                // Build lookup of all lit cell positions for unlit fill
                const litSet = this.cells;

                let html = '';
                for (let y = this.maxY; y >= this.minY; y--) {
                    for (let x = this.minX; x <= this.maxX; x++) {
                        const cell = litSet.get(this.getKey(x, y));
                        if (cell && !cell.isUnlit) {
                            // Lit LED
                            const shadow = buildGlowStyle(cell.color, cell.glowKey);
                            html += `<span style="color:${cell.color};text-shadow:${shadow}">${LED_DOT}</span>`;
                        } else if (showUnlit) {
                            // Unlit LED dot - always shown if panel mode on
                            html += `<span style="color:${UNLIT_COLOR}">${UNLIT_DOT}</span>`;
                        } else {
                            html += ' ';
                        }
                    }
                    if (y > this.minY) html += '\n';
                }
                return html;
            }

            getWidth()  { return this.maxX - this.minX + 1; }
            getHeight() { return this.maxY - this.minY + 1; }
        }

        // Build CSS text-shadow glow string from a color and glow level key
        function buildGlowStyle(color, glowKey) {
            const g = GLOW[glowKey] || GLOW.leaf_medium;
            // Parse rgb from color string
            const rgb = parseRgb(color);
            const col2 = `rgba(${rgb.r},${rgb.g},${rgb.b},${g.alpha2})`;
            return `0 0 ${g.blur1}px ${color}, 0 0 ${g.blur2}px ${col2}`;
        }

        function parseRgb(color) {
            const m = color.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
            if (m) return { r: +m[1], g: +m[2], b: +m[3] };
            return { r: 255, g: 255, b: 255 };
        }

        // Convert #rrggbb hex to {r,g,b}
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return { r, g, b };
        }

        // Build a monochrome palette from a base hex color.
        // Trunk/dense leaves are bright; sparse leaves are dimmed.
        function buildMonoPalette(hex) {
            const { r, g, b } = hexToRgb(hex);
            // Scale helper: multiply each channel by factor, clamp to 0-255
            const scale = (f) => ({
                r: [Math.round(r*f*0.85), Math.round(Math.min(255, r*f))],
                g: [Math.round(g*f*0.85), Math.round(Math.min(255, g*f))],
                b: [Math.round(b*f*0.85), Math.round(Math.min(255, b*f))]
            });
            return {
                name: 'Monochrome',
                monochrome: true,
                monoHex: hex,
                branch: scale(0.35),   // trunk: dark — clearly structural, not glowing
                leaves: [
                    scale(1.0),        // dense: full brightness
                    scale(0.75),       // medium
                    scale(0.40),       // sparse: dim edge dots
                ],
                base: `rgb(${Math.round(r*0.25)}, ${Math.round(g*0.25)}, ${Math.round(b*0.25)})`,
                fruit: {
                    colors: [ scale(1.0) ],
                    chance: 0.0        // no fruit in mono mode
                }
            };
        }

        // ============================================
        // Vector Utility
        // ============================================
        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(other) { return new Vector(this.x + other.x, this.y + other.y); }
            scale(s)   { return new Vector(this.x * s, this.y * s); }
            magnitude() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            normalize() {
                const m = this.magnitude();
                if (m === 0) return new Vector(0, 0);
                return new Vector(this.x / m, this.y / m);
            }
        }

        // ============================================
        // Animation Queue
        // ============================================
        class AnimationQueue {
            constructor() {
                this.queue = [];
                this.isRunning = false;
                this.isStopped = false;
                this.generationId = 0;
            }

            add(action) { this.queue.push(action); }

            stop() {
                this.isStopped = true;
                this.isRunning = false;
                this.queue = [];
            }

            reset() {
                this.stop();
                this.generationId++;
                this.isStopped = false;
                return this.generationId;
            }

            async run(delayMs, onUpdate, genId) {
                this.isRunning = true;
                while (this.queue.length > 0 && !this.isStopped && genId === this.generationId) {
                    const action = this.queue.shift();
                    action();
                    onUpdate();
                    if (delayMs > 0) {
                        await new Promise(resolve => setTimeout(resolve, delayMs));
                    }
                }
                if (genId === this.generationId) {
                    this.isRunning = false;
                }
            }
        }
