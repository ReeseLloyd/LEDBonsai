        // ============================================
        // Base Tree Class
        // ============================================
        class Tree {
            static BOX_HEIGHT = 3;
            static MAX_TOP_WIDTH = 35;

            // Pot color palettes (same as JSBonsai)
            static POT_COLORS = {
                terracotta: { name: 'Terracotta', color: 'rgb(180, 90, 50)',  rimColor: 'rgb(200, 110, 65)', accentColor: 'rgb(150, 70, 40)',  fillColor: 'rgb(160, 80, 45)'  },
                slate:      { name: 'Slate',      color: 'rgb(90, 95, 105)',  rimColor: 'rgb(110, 115, 125)',accentColor: 'rgb(70, 75, 85)',   fillColor: 'rgb(80, 85, 95)'   },
                jade:       { name: 'Jade',       color: 'rgb(60, 130, 90)',  rimColor: 'rgb(80, 155, 110)', accentColor: 'rgb(45, 105, 70)',  fillColor: 'rgb(55, 120, 82)'  },
                ocean:      { name: 'Ocean Blue', color: 'rgb(50, 100, 140)', rimColor: 'rgb(70, 125, 165)', accentColor: 'rgb(35, 80, 115)',  fillColor: 'rgb(45, 90, 130)'  },
                oxblood:    { name: 'Oxblood',    color: 'rgb(120, 40, 45)',  rimColor: 'rgb(145, 55, 60)',  accentColor: 'rgb(95, 30, 35)',   fillColor: 'rgb(110, 35, 40)'  },
                charcoal:   { name: 'Charcoal',   color: 'rgb(55, 55, 60)',   rimColor: 'rgb(75, 75, 80)',   accentColor: 'rgb(40, 40, 45)',   fillColor: 'rgb(50, 50, 55)'   },
                cream:      { name: 'Cream',      color: 'rgb(220, 210, 185)',rimColor: 'rgb(235, 225, 200)',accentColor: 'rgb(195, 185, 160)',fillColor: 'rgb(210, 200, 175)' },
                copper:     { name: 'Copper',     color: 'rgb(170, 105, 70)', rimColor: 'rgb(195, 130, 90)', accentColor: 'rgb(140, 80, 50)',  fillColor: 'rgb(160, 95, 62)'  },
                // Gloss colors — richer saturation + specular highlight dots
                cobalt:     { name: 'Cobalt (Gloss)',     gloss: true, color: 'rgb(30, 60, 180)',   rimColor: 'rgb(50, 85, 210)',   accentColor: 'rgb(20, 45, 145)',  highlight: 'rgb(180, 200, 255)' },
                vermillion:  { name: 'Vermillion (Gloss)', gloss: true, color: 'rgb(210, 55, 30)',   rimColor: 'rgb(235, 80, 50)',   accentColor: 'rgb(170, 35, 20)',  highlight: 'rgb(255, 210, 200)' },
                obsidian:   { name: 'Obsidian (Gloss)',   gloss: true, color: 'rgb(25, 25, 45)',    rimColor: 'rgb(45, 45, 70)',    accentColor: 'rgb(15, 15, 35)',   highlight: 'rgb(180, 185, 230)' },
                forest:     { name: 'Forest (Gloss)',     gloss: true, color: 'rgb(20, 100, 50)',   rimColor: 'rgb(35, 125, 70)',   accentColor: 'rgb(12, 75, 35)',   highlight: 'rgb(170, 255, 200)' },
                aubergine:  { name: 'Aubergine (Gloss)',  gloss: true, color: 'rgb(90, 30, 110)',   rimColor: 'rgb(115, 50, 140)',  accentColor: 'rgb(65, 18, 82)',   highlight: 'rgb(230, 185, 255)' },
                gold:       { name: 'Gold (Gloss)',       gloss: true, color: 'rgb(190, 145, 20)',  rimColor: 'rgb(220, 175, 40)',  accentColor: 'rgb(150, 110, 12)', highlight: 'rgb(255, 250, 190)' },
                teal:       { name: 'Teal (Gloss)',       gloss: true, color: 'rgb(15, 130, 130)',  rimColor: 'rgb(30, 160, 160)',  accentColor: 'rgb(8, 100, 100)',  highlight: 'rgb(170, 255, 255)' },
            };

            constructor(grid, rootX, rootY, options, rng, animQueue) {
                this.grid = grid;
                this.rootX = rootX;
                this.rootY = rootY;
                this.options = options;
                this.rng = rng;
                this.animQueue = animQueue;

                this.palette = options.palette === 'monochrome'
                    ? buildMonoPalette(options.monoColor || '#39ff14')
                    : (COLOR_PALETTES[options.palette] || COLOR_PALETTES.autumn);

                if (options.potColor && options.potColor !== 'random') {
                    this.potColor = Tree.POT_COLORS[options.potColor];
                } else {
                    const keys = Object.keys(Tree.POT_COLORS);
                    this.potColor = Tree.POT_COLORS[this.rng.choice(keys)];
                }

                this.boxTopWidth = this.getBoxWidth();
            }

            getBoxWidth() {
                let width = this.options.potSize || 25;
                width = Math.min(width, Tree.MAX_TOP_WIDTH);
                if (width % 2 === 0) width += 1;
                return width;
            }

            // Set an LED dot on the grid
            setLED(x, y, color, glowKey) {
                this.grid.setChar(x, y, color, glowKey, false);
            }

            setLEDAnimated(x, y, color, glowKey) {
                if (this.options.instant) {
                    this.setLED(x, y, color, glowKey);
                } else {
                    this.animQueue.add(() => {
                        this.setLED(x, y, color, glowKey);
                    });
                }
            }

            getBranchColor() {
                const p = this.palette.branch;
                return `rgb(${this.rng.randInt(p.r[0], p.r[1])}, ${this.rng.randInt(p.g[0], p.g[1])}, ${this.rng.randInt(p.b[0], p.b[1])})`;
            }

            getBarkMarkColor() {
                if (!this.palette.barkMarks) return null;
                const p = this.palette.barkMarks;
                return `rgb(${this.rng.randInt(p.r[0], p.r[1])}, ${this.rng.randInt(p.g[0], p.g[1])}, ${this.rng.randInt(p.b[0], p.b[1])})`;
            }

            // Returns probability (0–1) of a bark mark occurring for this pixel,
            // based on barkStyle, current width, and position along the branch.
            getBarkMarkChance(width, i, steps) {
                const style = this.palette.barkStyle;
                if (!style) return 0;
                switch (style) {
                    case 'marks':
                        // Birch: dark horizontal dashes; more likely on wider trunk
                        return 0.10 * Math.min(0.8, width / 4);
                    case 'lenticels':
                        // Cherry/Sakura: lighter horizontal bands; moderate frequency, any width
                        return 0.08;
                    case 'furrows':
                        // Juniper: dark vertical lines; only on thick branches
                        return width >= 3 ? 0.14 : 0.03;
                    case 'flake':
                        // Maple: occasional lighter patches; clusters together
                        return 0.07 * Math.min(1.0, width / 3);
                    default:
                        return 0;
                }
            }

            drawLine(x1, y1, x2, y2, width) {
                const dx = x2 - x1;
                const dy = y2 - y1;
                const steps = Math.max(Math.abs(dx), Math.abs(dy)) * 2;
                if (steps === 0) return;

                const theta = Math.atan2(dx, dy);
                const glowKey = this.getGlowKeyForWidth(width);
                const hasBark = !!this.palette.barkStyle;

                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    const x = x1 + dx * t;
                    const y = y1 + dy * t;

                    for (let w = -Math.floor(width / 2); w <= Math.floor(width / 2); w++) {
                        const offsetX = x + w * Math.cos(theta);
                        const offsetY = y - w * Math.sin(theta);

                        let color = this.getBranchColor();
                        // Bark variation: single RNG call per pixel
                        if (hasBark) {
                            const chance = this.getBarkMarkChance(width, i, steps);
                            if (this.rng.next() < chance) {
                                color = this.getBarkMarkColor() || color;
                            }
                        }

                        this.setLEDAnimated(Math.round(offsetX), Math.round(offsetY), color, glowKey);
                    }
                }
            }

            getEndCoords(startX, startY, length, theta) {
                return {
                    x: startX + length * Math.sin(theta),
                    y: startY + length * Math.cos(theta)
                };
            }

            // Map branch width to a glow key for density simulation
            getGlowKeyForWidth(width) {
                if (!this.options.glowIntensity) return 'trunk_medium';
                if (width >= 4) return 'trunk_thick';
                if (width >= 2) return 'trunk_medium';
                return 'trunk_thin';
            }

            getInitialParams() {
                let initialWidth = Math.floor(this.options.startLen / 5);
                initialWidth = Math.max(1, Math.min(6, initialWidth));
                const initialAngle = this.rng.normalvariate(0, 0.14);
                return { initialWidth, initialAngle };
            }

            // Draw pot as a filled rectangle of LED dots
            // Shape: rim row, then tapered walls, then bottom row, then feet
            drawBox() {
                const startY = this.rootY - 1;
                const colors = this.potColor;
                const rimWidth = this.boxTopWidth;
                const rimStartX = this.rootX - Math.floor(rimWidth / 2);

                // Rim row
                for (let j = 0; j < rimWidth; j++) {
                    this.setLED(rimStartX + j, startY, colors.rimColor, 'pot');
                }

                // Body rows (tapered)
                for (let i = 1; i < Tree.BOX_HEIGHT; i++) {
                    const y = startY - i;
                    const taper = i;
                    const width = this.boxTopWidth - taper * 2;
                    const startX = this.rootX - Math.floor(width / 2);

                    for (let j = 0; j < width; j++) {
                        const x = startX + j;
                        const isWall   = (j === 0 || j === width - 1);
                        const isBottom = (i === Tree.BOX_HEIGHT - 1);
                        const color = isBottom ? colors.accentColor
                                    : isWall   ? colors.color
                                    :            colors.rimColor; // interior filled with rim color
                        this.setLED(x, y, color, 'pot');
                    }
                }

                // Feet
                this.drawBoxFeet(startY);

                // Gloss highlight — 2-3 specular dots in upper-left of body, pot color
                if (colors.gloss) {
                    const bodyRow1Y = startY - 1;
                    const bodyRow2Y = startY - 2;
                    const body1Width = this.boxTopWidth - 2;
                    const body1StartX = this.rootX - Math.floor(body1Width / 2);
                    this.setLED(body1StartX + 1, bodyRow1Y, colors.rimColor, 'pot');
                    this.setLED(body1StartX + 1, bodyRow2Y, colors.rimColor, 'pot');
                    this.setLED(body1StartX + 2, bodyRow2Y, colors.rimColor, 'pot');
                }
            }

            drawBoxFeet(startY) {
                const y = startY - Tree.BOX_HEIGHT;
                const bottomWidth = this.boxTopWidth - (Tree.BOX_HEIGHT - 1) * 2;
                const offset = Math.floor(bottomWidth / 2) - 1;
                if (offset > 0) {
                    this.setLED(this.rootX - offset, y, this.potColor.accentColor, 'pot');
                    this.setLED(this.rootX + offset, y, this.potColor.accentColor, 'pot');
                }
            }

            // Tree base: a few lit dots at the trunk base
            drawTreeBase(trunkWidth) {
                const y = this.rootY;
                const leftX  = this.rootX - Math.floor(trunkWidth / 2);
                const rightX = this.rootX + Math.floor(trunkWidth / 2);
                const baseColor = this.palette.base;
                this.setLED(leftX - 2, y, baseColor, 'trunk_thin');
                this.setLED(leftX - 1, y, baseColor, 'trunk_thin');
                this.setLED(rightX + 1, y, baseColor, 'trunk_thin');
                this.setLED(rightX + 2, y, baseColor, 'trunk_thin');
            }
        }

        // ============================================
        // Leaves - LED particle system
        // ============================================
        class Leaves {
            static NUM_LEAVES = 4;

            constructor(grid, x, y, options, rng, animQueue, palette) {
                this.grid = grid;
                this.x = x;
                this.y = y;
                this.options = options;
                this.rng = rng;
                this.animQueue = animQueue;
                this.palette = palette;
            }

            getLeafColor() {
                const leafColors = this.palette.leaves;
                const p = this.rng.choice(leafColors);
                return `rgb(${this.rng.randInt(p.r[0], p.r[1])}, ${this.rng.randInt(p.g[0], p.g[1])}, ${this.rng.randInt(p.b[0], p.b[1])})`;
            }

            getFruitColor() {
                if (!this.palette.fruit) return null;
                const p = this.rng.choice(this.palette.fruit.colors);
                return `rgb(${this.rng.randInt(p.r[0], p.r[1])}, ${this.rng.randInt(p.g[0], p.g[1])}, ${this.rng.randInt(p.b[0], p.b[1])})`;
            }

            // Map distance ratio to glow key for foliage density gradient
            getLeafGlowKey(distanceRatio) {
                if (!this.options.glowIntensity) return 'leaf_medium';
                if (distanceRatio < 0.3) return 'leaf_dense';
                if (distanceRatio < 0.7) return 'leaf_medium';
                return 'leaf_sparse';
            }

            draw() {
                // Bare palettes (e.g. Winter Bare) — no foliage, only optional snow tips
                if (this.palette.bare) {
                    if (this.options.showFruit && this.palette.fruit &&
                        this.rng.next() < this.palette.fruit.chance) {
                        const p = this.rng.choice(this.palette.fruit.colors);
                        const color = `rgb(${this.rng.randInt(p.r[0], p.r[1])}, ${this.rng.randInt(p.g[0], p.g[1])}, ${this.rng.randInt(p.b[0], p.b[1])})`;
                        const px = Math.round(this.x);
                        const py = Math.round(this.y);
                        if (this.options.instant) {
                            this.grid.setChar(px, py, color, 'leaf_sparse', false);
                        } else {
                            this.animQueue.add(() => { this.grid.setChar(px, py, color, 'leaf_sparse', false); });
                        }
                    }
                    return;
                }

                const gravity = new Vector(0, -1);

                for (let i = 0; i < Leaves.NUM_LEAVES; i++) {
                    let vel = new Vector(
                        this.rng.randFloat(-1, 1),
                        this.rng.randFloat(-1, 1)
                    ).normalize();

                    let pos = new Vector(this.x, this.y);

                    for (let j = 0; j < this.options.leafLen; j++) {
                        pos = pos.add(vel);
                        const distanceRatio = j / this.options.leafLen;

                        const isFruit = this.options.showFruit &&
                            this.palette.fruit &&
                            this.rng.next() < this.palette.fruit.chance;

                        let color, glowKey;
                        if (isFruit) {
                            color   = this.getFruitColor();
                            // cone and catkin fruit are subtler than berries/blossoms
                            const style = this.palette.fruit.style;
                            glowKey = (style === 'cone' || style === 'catkin') ? 'leaf_medium' : 'fruit';
                        } else {
                            color   = this.getLeafColor();
                            glowKey = this.getLeafGlowKey(distanceRatio);
                        }

                        const px = Math.round(pos.x);
                        const py = Math.round(pos.y);

                        if (this.options.instant) {
                            this.grid.setChar(px, py, color, glowKey, false);
                        } else {
                            this.animQueue.add(() => {
                                this.grid.setChar(px, py, color, glowKey, false);
                            });
                        }

                        // Apply gravity
                        const weight = j / this.options.leafLen;
                        vel = vel.add(gravity.scale(weight));
                    }
                }
            }
        }

        // ============================================
        // Classic Tree
        // ============================================
        class ClassicTree extends Tree {
            static MEAN_BRANCHES  = 2;
            static BRANCHES_STD_DEV = 0.5;
            static ANGLE_STD_DEV  = 0.14;
            static LEN_SCALE      = 0.75;

            draw() {
                const { initialWidth, initialAngle } = this.getInitialParams();
                this.drawBox();
                this.drawTreeBase(initialWidth);
                this.drawBranch(this.rootX, this.rootY, 1, this.options.startLen, initialWidth, initialAngle);
            }

            drawBranch(x, y, layer, length, width, theta) {
                if (layer >= this.options.layers) {
                    new Leaves(this.grid, x, y, this.options, this.rng, this.animQueue, this.palette).draw();
                    return;
                }
                const end = this.getEndCoords(x, y, length, theta);
                this.drawLine(x, y, end.x, end.y, Math.round(width));
                this.drawEndBranches(x, y, layer, length, width, theta);
            }

            drawEndBranches(startX, startY, layer, length, width, theta) {
                let sign = 1;
                let numBranches = Math.max(0, Math.round(
                    this.rng.normalvariate(ClassicTree.MEAN_BRANCHES, ClassicTree.BRANCHES_STD_DEV)
                ));
                const step = numBranches !== 0 ? length / numBranches : 0;
                const newWidth  = Math.max(1, width - 1);
                const newLength = length * ClassicTree.LEN_SCALE;

                for (let i = 0; i < numBranches; i++) {
                    const distUpBranch = (i + 1) * step;
                    const newTheta = theta + sign * this.rng.normalvariate(this.options.angleMean, ClassicTree.ANGLE_STD_DEV);
                    const pos = this.getEndCoords(startX, startY, distUpBranch, theta);
                    this.drawBranch(pos.x, pos.y, layer + 1, newLength, newWidth, newTheta);
                    sign *= -1;
                }
            }
        }

        // ============================================
        // Fibonacci Tree
        // ============================================
        class FibonacciTree extends Tree {
            static ANGLE_STD_DEV = 0.14;
            static LEN_SCALE = 0.75;

            constructor(grid, rootX, rootY, options, rng, animQueue) {
                super(grid, rootX, rootY, options, rng, animQueue);
                this.fib = this.fibNums();
                this.branchNums = this.generateBranchNums();
            }

            fibNums() {
                const fib = [1, 1];
                for (let i = 0; i < this.options.layers; i++) {
                    fib.push(fib[fib.length - 1] + fib[fib.length - 2]);
                }
                return fib;
            }

            generateBranchNums() {
                const branchNums = [[1]];
                for (let i = 0; i < this.options.layers; i++) {
                    const numBranches = this.fib[i + 2];
                    const numParents  = branchNums[branchNums.length - 1].reduce((a, b) => a + b, 0);
                    const base = Math.floor(numBranches / numParents);
                    const diff = numBranches - base * numParents;
                    let currentNums = [];
                    for (let j = 0; j < numParents; j++) {
                        currentNums.push(j < diff ? base + 1 : base);
                    }
                    currentNums = this.rng.shuffle(currentNums);
                    branchNums.push(currentNums);
                }
                return branchNums;
            }

            draw() {
                const { initialWidth, initialAngle } = this.getInitialParams();
                this.drawBox();
                this.drawTreeBase(initialWidth);
                this.drawBranch(this.rootX, this.rootY, 1, 0, this.options.startLen, initialWidth, initialAngle);
            }

            drawBranch(x, y, layerInx, branchInx, length, width, theta) {
                if (layerInx > this.options.layers) {
                    new Leaves(this.grid, x, y, this.options, this.rng, this.animQueue, this.palette).draw();
                    return;
                }
                const end = this.getEndCoords(x, y, length, theta);
                this.drawLine(x, y, end.x, end.y, Math.round(width));
                this.drawEndBranches(x, y, layerInx, branchInx, length, width, theta);
            }

            drawEndBranches(startX, startY, layerInx, branchInx, length, width, theta) {
                let sign = 1;
                const numBranches = this.branchNums[layerInx][branchInx];
                const newWidth  = Math.max(1, width - 1);
                const end = this.getEndCoords(startX, startY, length, theta);

                for (let i = 0; i < numBranches; i++) {
                    const angle    = this.rng.normalvariate(this.options.angleMean, FibonacciTree.ANGLE_STD_DEV);
                    const newTheta = theta + sign * angle;
                    const newLen   = length * FibonacciTree.LEN_SCALE;
                    this.drawBranch(end.x, end.y, layerInx + 1, branchInx + i, newLen, newWidth, newTheta);
                    sign *= -1;
                }
            }
        }

        // ============================================
        // Offset Fibonacci Tree
        // ============================================
        class OffsetFibTree extends FibonacciTree {
            drawEndBranches(startX, startY, layerInx, branchInx, length, width, theta) {
                let sign = 1;
                const numBranches = this.branchNums[layerInx][branchInx];
                const step = numBranches !== 0 ? length / numBranches : 0;
                const newWidth  = Math.max(1, width - 1);
                const newLength = length * FibonacciTree.LEN_SCALE;

                for (let i = 0; i < numBranches; i++) {
                    const distUpBranch = (i + 1) * step;
                    const newTheta = theta + sign * this.rng.normalvariate(this.options.angleMean, FibonacciTree.ANGLE_STD_DEV);
                    const pos = this.getEndCoords(startX, startY, distUpBranch, theta);
                    this.drawBranch(pos.x, pos.y, layerInx + 1, branchInx + i, newLength, newWidth, newTheta);
                    sign *= -1;
                }
            }
        }

        // ============================================
        // Random Offset Fibonacci Tree
        // ============================================
        class RandomOffsetFibTree extends FibonacciTree {
            static GROW_END_THRESHOLD = 0.5;
            static NON_END_MIN = 0.3;
            static NON_END_MAX = 0.9;

            drawEndBranches(startX, startY, layerInx, branchInx, length, width, theta) {
                let sign = 1;
                const numBranches = this.branchNums[layerInx][branchInx];
                const newWidth  = Math.max(1, width - 1);
                const newLength = length * FibonacciTree.LEN_SCALE;
                let needLeaves = true;

                for (let i = 0; i < numBranches; i++) {
                    const growAtEnd = this.rng.next() < RandomOffsetFibTree.GROW_END_THRESHOLD;
                    let distUpBranch;
                    if (growAtEnd) {
                        needLeaves = false;
                        distUpBranch = length;
                    } else {
                        distUpBranch = this.rng.randFloat(
                            length * RandomOffsetFibTree.NON_END_MIN,
                            length * RandomOffsetFibTree.NON_END_MAX
                        );
                    }
                    const newTheta = theta + sign * this.rng.normalvariate(this.options.angleMean, FibonacciTree.ANGLE_STD_DEV);
                    const pos = this.getEndCoords(startX, startY, distUpBranch, theta);
                    this.drawBranch(pos.x, pos.y, layerInx + 1, branchInx + i, newLength, newWidth, newTheta);
                    sign *= -1;
                }

                if (needLeaves) {
                    const endPos = this.getEndCoords(startX, startY, length, theta);
                    new Leaves(this.grid, endPos.x, endPos.y, this.options, this.rng, this.animQueue, this.palette).draw();
                }
            }
        }

        // ============================================
        // Hardcoded defaults (for the Defaults button)
        // ============================================
        const DEFAULTS = {
            treeType:  '0',        // Classic
            palette:   'autumn',
            monoColor: '#39ff14',
            layers:    8,
            startLen:  15,
            angle:     40,
            leafLen:   4,
        };

        // All palette keys (for randomize)
        const PALETTE_KEYS = ['autumn', 'maple', 'cherry', 'willow', 'juniper', 'winter', 'birch', 'jacaranda', 'wisteria', 'winterbare', 'sakuranight', 'monochrome'];
        const TREE_TYPES   = ['0', '1', '2', '3'];

        // ============================================
        // Main Application
        // ============================================
        class LEDBonsai {
            constructor() {
                this.canvas         = document.getElementById('tree-canvas');
                this.display        = document.getElementById('tree-display');
                this.generateBtn    = document.getElementById('generate-btn');
                this.stopBtn        = document.getElementById('stop-btn');
                this.randomizeBtn   = document.getElementById('randomize-btn');
                this.copyBtn        = document.getElementById('copy-btn');
                this.shareUrlInput  = document.getElementById('share-url');
                this.zoomInBtn      = document.getElementById('zoom-in-btn');
                this.zoomOutBtn     = document.getElementById('zoom-out-btn');
                this.zoomResetBtn   = document.getElementById('zoom-reset-btn');
                this.zoomLevelSpan  = document.getElementById('zoom-level');
                this.animQueue      = new AnimationQueue();

                this.zoomLevel = 100;
                this.minZoom   = 25;
                this.maxZoom   = 200;
                this.zoomStep  = 25;

                this.bindControls();
                this.bindEvents();
                this.updateMonoVisibility();

                if (!this.loadFromUrl()) {
                    this.generate();
                }
            }

            loadFromUrl() {
                const params = new URLSearchParams(window.location.search);
                if (!params.has('seed')) return false;

                const paramMap = {
                    'seed':     'seed',
                    'type':     'tree-type',
                    'layers':   'layers',
                    'len':      'start-len',
                    'angle':    'angle',
                    'leaf':     'leaf-len',
                    'palette':  'color-palette',
                    'potcolor': 'pot-color',
                    'potsize':  'pot-size',
                    'glow':     'glow-intensity',
                    'fruit':    'show-fruit',
                    'unlit':    'unlit-panel'
                };

                for (const [urlKey, elemId] of Object.entries(paramMap)) {
                    if (params.has(urlKey)) {
                        const elem = document.getElementById(elemId);
                        if (elem) {
                            if (elem.type === 'checkbox') {
                                elem.checked = params.get(urlKey) === '1';
                            } else {
                                elem.value = params.get(urlKey);
                            }
                            const valSpan = document.getElementById(`${elemId}-val`);
                            if (valSpan) {
                                valSpan.textContent = elemId === 'angle' ? `${elem.value}°` : elem.value;
                            }
                        }
                    }
                }

                // Restore mono color if present
                if (params.has('mono')) {
                    const monoHex = decodeURIComponent(params.get('mono'));
                    document.getElementById('mono-color').value = monoHex;
                    // Sync preset active state
                    this.syncMonoPreset(monoHex);
                }

                // Show/hide mono controls based on palette
                this.updateMonoVisibility();

                this.generate();
                return true;
            }

            buildShareUrl(options) {
                const params = new URLSearchParams();
                params.set('seed',     options.seed);
                params.set('type',     document.getElementById('tree-type').value);
                params.set('layers',   options.layers);
                params.set('len',      options.startLen);
                params.set('angle',    document.getElementById('angle').value);
                params.set('leaf',     options.leafLen);
                params.set('palette',  options.palette);
                params.set('mono',     encodeURIComponent(options.monoColor));
                params.set('potcolor', options.potColor);
                params.set('potsize',  options.potSize);
                params.set('glow',     options.glowIntensity ? '1' : '0');
                params.set('fruit',    options.showFruit     ? '1' : '0');
                params.set('unlit',    options.unlitPanel    ? '1' : '0');
                return `${window.location.origin}${window.location.pathname}?${params.toString()}`;
            }

            setZoom(level) {
                this.zoomLevel = Math.max(this.minZoom, Math.min(this.maxZoom, level));
                this.zoomLevelSpan.textContent = this.zoomLevel;
                this.display.style.transform = `scale(${this.zoomLevel / 100})`;
            }

            bindControls() {
                const ranges = ['layers', 'start-len', 'angle', 'leaf-len', 'speed', 'pot-size'];
                ranges.forEach(id => {
                    const input   = document.getElementById(id);
                    const valSpan = document.getElementById(`${id}-val`);
                    if (input && valSpan) {
                        input.addEventListener('input', () => {
                            valSpan.textContent = id === 'angle' ? `${input.value}°` : input.value;
                        });
                    }
                });
            }

            bindEvents() {
                this.generateBtn.addEventListener('click', () => this.generate());
                this.stopBtn.addEventListener('click',    () => this.stop());

                this.randomizeBtn.addEventListener('click', () => {
                    document.getElementById('seed').value = Math.floor(Math.random() * 2147483647);
                    this.generate();
                });

                this.copyBtn.addEventListener('click', () => {
                    const url = this.shareUrlInput.value;
                    if (!url) return;
                    const finish = () => {
                        this.copyBtn.textContent = '✓';
                        setTimeout(() => { this.copyBtn.textContent = '📋'; }, 1500);
                    };
                    if (navigator.clipboard && window.isSecureContext) {
                        navigator.clipboard.writeText(url).then(finish).catch(() => this.copyFallback(url, finish));
                    } else {
                        this.copyFallback(url, finish);
                    }
                });

                this.zoomInBtn.addEventListener('click',    () => this.setZoom(this.zoomLevel + this.zoomStep));
                this.zoomOutBtn.addEventListener('click',   () => this.setZoom(this.zoomLevel - this.zoomStep));
                this.zoomResetBtn.addEventListener('click', () => this.setZoom(100));

                document.querySelector('.canvas-container').addEventListener('wheel', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        e.preventDefault();
                        this.setZoom(this.zoomLevel + (e.deltaY > 0 ? -this.zoomStep : this.zoomStep));
                    }
                }, { passive: false });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.ctrlKey && !e.metaKey) {
                        if (document.activeElement.tagName !== 'INPUT') {
                            this.generate();
                        }
                    }
                });

                // Randomize all: tree type, palette, structure sliders
                document.getElementById('randomize-all-btn').addEventListener('click', () => {
                    this.randomizeAll();
                    this.generate();
                });

                // Defaults: restore fixed defaults and regenerate
                document.getElementById('defaults-btn').addEventListener('click', () => {
                    this.applyDefaults();
                    this.generate();
                });

                // Palette selector — show/hide mono sub-controls
                document.getElementById('color-palette').addEventListener('change', () => {
                    this.updateMonoVisibility();
                });

                // Monochrome preset buttons
                document.getElementById('mono-presets').addEventListener('click', (e) => {
                    const btn = e.target.closest('.mono-preset');
                    if (!btn) return;
                    const hex = btn.dataset.color;
                    document.getElementById('mono-color').value = hex;
                    this.syncMonoPreset(hex);
                });

                // Monochrome color picker — sync to nearest preset or clear active
                document.getElementById('mono-color').addEventListener('input', (e) => {
                    this.syncMonoPreset(e.target.value);
                });

                // Export button opens modal
                document.getElementById('export-btn').addEventListener('click', () => {
                    document.getElementById('export-status').textContent = '';
                    document.getElementById('export-modal').classList.add('visible');
                });

                // Export modal: background option selection
                document.getElementById('export-modal').addEventListener('click', (e) => {
                    const opt = e.target.closest('.bg-option');
                    if (opt) {
                        document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                    }
                });

                // Cancel export
                document.getElementById('export-cancel-btn').addEventListener('click', () => {
                    document.getElementById('export-modal').classList.remove('visible');
                    document.getElementById('export-confirm-btn').disabled = false;
                    document.getElementById('export-status').textContent = '';
                });

                // Close modal on overlay click
                document.getElementById('export-modal').addEventListener('click', (e) => {
                    if (e.target === document.getElementById('export-modal')) {
                        document.getElementById('export-modal').classList.remove('visible');
                        document.getElementById('export-confirm-btn').disabled = false;
                        document.getElementById('export-status').textContent = '';
                    }
                });

                // Confirm export
                document.getElementById('export-confirm-btn').addEventListener('click', () => {
                    const selected = document.querySelector('.bg-option.selected');
                    const bgType = selected ? selected.dataset.bg : 'panel';
                    this.exportPNG(bgType);
                });
            }

            randomizeAll() {
                // Tree type — pick randomly
                const treeType = TREE_TYPES[Math.floor(Math.random() * TREE_TYPES.length)];
                document.getElementById('tree-type').value = treeType;

                // Palette — pick randomly
                const palette = PALETTE_KEYS[Math.floor(Math.random() * PALETTE_KEYS.length)];
                document.getElementById('color-palette').value = palette;
                // If monochrome, pick a random preset color
                if (palette === 'monochrome') {
                    const presets = Array.from(document.querySelectorAll('.mono-preset'));
                    const preset  = presets[Math.floor(Math.random() * presets.length)];
                    const hex     = preset.dataset.color;
                    document.getElementById('mono-color').value = hex;
                    this.syncMonoPreset(hex);
                }
                this.updateMonoVisibility();

                // Structure sliders — randomize within reasonable ranges
                const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
                const setSlider = (id, val) => {
                    const el = document.getElementById(id);
                    el.value = val;
                    const span = document.getElementById(`${id}-val`);
                    if (span) span.textContent = id === 'angle' ? `${val}°` : val;
                };
                setSlider('layers',    randInt(5, 12));
                setSlider('start-len', randInt(8, 25));
                setSlider('angle',     randInt(20, 65));
                setSlider('leaf-len',  randInt(2, 8));
            }

            applyDefaults() {
                const setSlider = (id, val) => {
                    const el = document.getElementById(id);
                    el.value = val;
                    const span = document.getElementById(`${id}-val`);
                    if (span) span.textContent = id === 'angle' ? `${val}°` : val;
                };

                document.getElementById('tree-type').value    = DEFAULTS.treeType;
                document.getElementById('color-palette').value = DEFAULTS.palette;
                document.getElementById('mono-color').value   = DEFAULTS.monoColor;
                this.syncMonoPreset(DEFAULTS.monoColor);
                this.updateMonoVisibility();

                setSlider('layers',    DEFAULTS.layers);
                setSlider('start-len', DEFAULTS.startLen);
                setSlider('angle',     DEFAULTS.angle);
                setSlider('leaf-len',  DEFAULTS.leafLen);
            }

            copyFallback(text, onSuccess) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                try {
                    document.execCommand('copy');
                    onSuccess();
                } catch (e) {
                    console.warn('Copy failed:', e);
                }
                document.body.removeChild(ta);
            }

            // Show/hide monochrome sub-controls based on palette selection
            updateMonoVisibility() {
                const palette = document.getElementById('color-palette').value;
                const mono = document.getElementById('mono-controls');
                if (palette === 'monochrome') {
                    mono.classList.add('visible');
                } else {
                    mono.classList.remove('visible');
                }
            }

            // Sync which preset circle looks "active" based on current hex
            syncMonoPreset(hex) {
                const normalized = hex.toLowerCase();
                document.querySelectorAll('.mono-preset').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.color.toLowerCase() === normalized);
                    if (btn.dataset.color.toLowerCase() === normalized) {
                        btn.style.boxShadow = `0 0 8px ${hex}`;
                    } else {
                        btn.style.boxShadow = 'none';
                    }
                });
            }

            // PNG Export — draws directly to canvas using the same font/glow as the display
            async exportPNG(bgType) {
                const statusEl   = document.getElementById('export-status');
                const confirmBtn = document.getElementById('export-confirm-btn');
                statusEl.textContent = 'Rendering…';
                confirmBtn.disabled  = true;

                // Yield to browser so "Rendering…" actually appears
                await new Promise(r => setTimeout(r, 30));

                try {
                    const treeDisplayEl = document.getElementById('tree-display');
                    const canvasEl      = document.getElementById('tree-canvas');

                    // Measure actual rendered font metrics from the live element
                    const style      = window.getComputedStyle(treeDisplayEl);
                    const fontSize   = parseFloat(style.fontSize);       // px
                    const lineHeight = fontSize * 1.0;                   // matches line-height:1.0
                    // letter-spacing: 0.12em adds spacing AFTER each char
                    const letterSpacing = fontSize * 0.12;
                    const charWidth     = fontSize * 0.6 + letterSpacing; // approx monospace char width + spacing
                    const paddingPx     = parseFloat(style.paddingLeft) || 32;

                    // Parse the rendered HTML to extract dots and their styles
                    // We read the current innerHTML which is the fully rendered tree
                    const html    = canvasEl.innerHTML;
                    const parser  = new DOMParser();
                    const doc     = parser.parseFromString(`<div>${html}</div>`, 'text/html');
                    const root    = doc.body.firstChild;

                    // Walk the rendered nodes to collect { char, color, shadow } per position
                    // The HTML is newline-separated rows of <span> and plain text chars
                    const rawText = root.innerHTML;

                    // Split into rows by newline
                    const rowHtmls = rawText.split('\n');
                    const rows = rowHtmls.map(rowHtml => {
                        const rowDoc  = parser.parseFromString(`<div>${rowHtml}</div>`, 'text/html');
                        const rowRoot = rowDoc.body.firstChild;
                        const cols = [];
                        rowRoot.childNodes.forEach(node => {
                            if (node.nodeType === Node.TEXT_NODE) {
                                for (const ch of node.textContent) {
                                    cols.push({ char: ch, color: null, shadow: null });
                                }
                            } else if (node.nodeType === Node.ELEMENT_NODE) {
                                const s = node.getAttribute('style') || '';
                                const colorMatch  = s.match(/color:([^;]+)/);
                                const shadowMatch = s.match(/text-shadow:([^"]+?)(?:;|$)/);
                                const color  = colorMatch  ? colorMatch[1].trim()  : null;
                                const shadow = shadowMatch ? shadowMatch[1].trim() : null;
                                for (const ch of node.textContent) {
                                    cols.push({ char: ch, color, shadow });
                                }
                            }
                        });
                        return cols;
                    });

                    const numRows = rows.length;
                    const numCols = rows.reduce((m, r) => Math.max(m, r.length), 0);

                    const canvasWidth  = numCols * charWidth + paddingPx * 2;
                    const canvasHeight = numRows * lineHeight + paddingPx * 2;

                    const dpr = window.devicePixelRatio || 1;
                    const offscreen = document.createElement('canvas');
                    offscreen.width  = Math.ceil(canvasWidth  * dpr);
                    offscreen.height = Math.ceil(canvasHeight * dpr);

                    const ctx = offscreen.getContext('2d');
                    ctx.scale(dpr, dpr);

                    // Background
                    if (bgType === 'panel') {
                        ctx.fillStyle = '#131316';
                        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                        // Dot grid
                        ctx.fillStyle = '#1c1c22';
                        const dotSpacing = 10;
                        for (let dy = 0; dy < canvasHeight; dy += dotSpacing) {
                            for (let dx = 0; dx < canvasWidth; dx += dotSpacing) {
                                ctx.beginPath();
                                ctx.arc(dx, dy, 0.8, 0, Math.PI * 2);
                                ctx.fill();
                            }
                        }
                    } else if (bgType === 'black') {
                        ctx.fillStyle = '#000';
                        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
                    }
                    // transparent: leave canvas clear

                    // Draw each character
                    ctx.font = `${fontSize}px "Courier New", Consolas, monospace`;
                    ctx.textBaseline = 'top';

                    for (let row = 0; row < rows.length; row++) {
                        const cols = rows[row];
                        for (let col = 0; col < cols.length; col++) {
                            const cell = cols[col];
                            if (!cell.char || cell.char === ' ') continue;

                            const cx = paddingPx + col * charWidth;
                            const cy = paddingPx + row * lineHeight;

                            if (cell.shadow) {
                                // Parse and apply glow shadows
                                // Format: "0 0 Xpx color, 0 0 Ypx color"
                                const parts = cell.shadow.split(/,(?![^(]*\))/);
                                for (const part of parts) {
                                    const m = part.trim().match(/0 0 ([\d.]+)px (.+)/);
                                    if (m) {
                                        ctx.shadowBlur  = parseFloat(m[1]) * dpr;
                                        ctx.shadowColor = m[2].trim();
                                        ctx.fillStyle   = cell.color || '#fff';
                                        ctx.fillText(cell.char, cx, cy);
                                    }
                                }
                                ctx.shadowBlur  = 0;
                                ctx.shadowColor = 'transparent';
                            }

                            // Draw the main dot
                            ctx.fillStyle = cell.color || '#ffffff';
                            ctx.fillText(cell.char, cx, cy);
                        }
                    }

                    // Download
                    offscreen.toBlob(blob => {
                        const a  = document.createElement('a');
                        a.href   = URL.createObjectURL(blob);
                        const seed = document.getElementById('seed').value || 'tree';
                        a.download = `ledbonsai-${seed}.png`;
                        a.click();
                        URL.revokeObjectURL(a.href);

                        statusEl.textContent = 'Downloaded!';
                        confirmBtn.disabled  = false;
                        setTimeout(() => {
                            document.getElementById('export-modal').classList.remove('visible');
                            statusEl.textContent = '';
                        }, 1200);
                    }, 'image/png');

                } catch (err) {
                    statusEl.textContent = 'Export failed: ' + err.message;
                    confirmBtn.disabled  = false;
                }
            }

            stop() {
                this.animQueue.stop();
                this.generateBtn.disabled = false;
                this.stopBtn.disabled     = true;
            }

            getOptions() {
                const seedInput = document.getElementById('seed');
                let seed;
                if (seedInput.value) {
                    seed = parseInt(seedInput.value);
                } else {
                    seed = Math.floor(Math.random() * 2147483647);
                    seedInput.value = seed;
                }

                const palette = document.getElementById('color-palette').value;
                const monoColor = document.getElementById('mono-color').value || '#39ff14';

                return {
                    seed,
                    treeType:      parseInt(document.getElementById('tree-type').value),
                    layers:        parseInt(document.getElementById('layers').value),
                    startLen:      parseInt(document.getElementById('start-len').value),
                    angleMean:     parseInt(document.getElementById('angle').value) * (Math.PI / 180),
                    leafLen:       parseInt(document.getElementById('leaf-len').value),
                    instant:       document.getElementById('instant').checked,
                    speed:         parseInt(document.getElementById('speed').value),
                    palette,
                    monoColor,
                    potColor:      document.getElementById('pot-color').value,
                    potSize:       parseInt(document.getElementById('pot-size').value),
                    glowIntensity: document.getElementById('glow-intensity').checked,
                    showFruit:     document.getElementById('show-fruit').checked,
                    unlitPanel:    document.getElementById('unlit-panel').checked,
                };
            }

            async generate() {
                const genId  = this.animQueue.reset();
                const options = this.getOptions();

                // Resolve random pot color here, before any RNG is used for the tree,
                // so that choosing "Random" vs a specific color doesn't shift the tree's RNG sequence
                if (options.potColor === 'random') {
                    const keys = Object.keys(Tree.POT_COLORS);
                    options.potColor = keys[Math.floor(Math.random() * keys.length)];
                }

                const rng    = new SeededRandom(options.seed);
                const grid   = new Grid();

                const rootX = 0;
                let rootY   = Tree.BOX_HEIGHT + 4;
                if (rootY % 2 !== 0) rootY++;

                let tree;
                switch (options.treeType) {
                    case 1:  tree = new FibonacciTree(grid, rootX, rootY, options, rng, this.animQueue);      break;
                    case 2:  tree = new OffsetFibTree(grid, rootX, rootY, options, rng, this.animQueue);      break;
                    case 3:  tree = new RandomOffsetFibTree(grid, rootX, rootY, options, rng, this.animQueue);break;
                    default: tree = new ClassicTree(grid, rootX, rootY, options, rng, this.animQueue);
                }

                tree.draw();

                this.shareUrlInput.value = this.buildShareUrl(options);

                const showUnlit = options.unlitPanel;

                if (options.instant) {
                    this.canvas.innerHTML = grid.render(showUnlit);
                } else {
                    this.generateBtn.disabled = true;
                    this.stopBtn.disabled     = false;

                    const baseDelay = 101 - options.speed;
                    const delay     = Math.max(1, Math.round(baseDelay / 48));

                    await this.animQueue.run(delay, () => {
                        this.canvas.innerHTML = grid.render(showUnlit);
                    }, genId);

                    if (genId === this.animQueue.generationId) {
                        this.generateBtn.disabled = false;
                        this.stopBtn.disabled     = true;
                    }
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new LEDBonsai();
        });
    </script>
</body>
